repos:
  - repo: local
    hooks:
      - id: omnisight-gitleaks
        name: OmniSight gitleaks secret scan
        entry: python3 -m backend.security_scanning.secrets --app-path . --scanner gitleaks
        language: system
        pass_filenames: false
        always_run: true
      - id: omnisight-trufflehog
        name: OmniSight trufflehog secret scan
        entry: python3 -m backend.security_scanning.secrets --app-path . --scanner trufflehog
        language: system
        pass_filenames: false
        always_run: true
      - id: omnisight-alembic-downgrade
        name: OmniSight alembic — reject silent downgrade=pass (FX.7.6)
        entry: python3 scripts/check_alembic_downgrade.py
        language: system
        files: ^backend/alembic/versions/.*\.py$
        pass_filenames: true
