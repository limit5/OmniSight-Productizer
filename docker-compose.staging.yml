# Staging compose — mirrors production but on different ports.
# Runs on WSL Ubuntu-22.04 for pre-release validation.
#
# Usage:
#   cd ~/work/sora/OmniSight-Productizer
#   cp .env.example .env.staging
#   # Edit .env.staging: set API keys + OMNISIGHT_ENV=staging
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
#
# Port mapping (avoids conflict with production on Ubuntu-24.04):
#   Frontend:  3010 (prod: 3000)
#   Backend-A: 8010 (prod: 8000)
#   Backend-B: 8011 (prod: 8001)
#   No Caddy/HTTPS — staging is internal only.

services:
  # FX.3.1 (2026-05-04) — staging mirrors prod's docker-socket-proxy pattern.
  # Previously backend-a + backend-b mounted /var/run/docker.sock directly,
  # giving any RCE in the staging FastAPI app full host-daemon control. Even
  # though staging is "internal only", the same backend image runs there and
  # any pre-release validation that exercises sandbox/container code paths
  # would be running them through the unsafe surface — masking allowlist
  # regressions that only surface in prod. Mirroring prod's proxy here
  # closes that gap and keeps staging an honest pre-release rehearsal.
  #
  # Allowlist matches docker-compose.prod.yml verbatim (CONTAINERS / IMAGES
  # / EXEC / POST = 1, all else = 0).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    restart: always
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - EXEC=1
      - POST=1
      - BUILD=0
      - AUTH=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EVENTS=0
      - INFO=0
      - NETWORKS=0
      - NODES=0
      - PLUGINS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
      - VOLUMES=0
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "2", "http://127.0.0.1:2375/_ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend-a:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-backend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8010:8000"
    volumes:
      - staging-data:/app/data
      - staging-artifacts:/app/.artifacts
      # FX.3.1: raw /var/run/docker.sock mount removed — backend now talks
      # to the daemon via DOCKER_HOST → docker-socket-proxy:2375 (allowlisted).
    environment:
      - OMNISIGHT_DEBUG=false
      - OMNISIGHT_AUTH_MODE=strict
      - OMNISIGHT_ENV=staging
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
      - OMNISIGHT_INSTANCE_ID=staging-a
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    env_file:
      - .env.staging
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend-b:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-backend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.backend
    command:
      - "sh"
      - "-c"
      - "WORKERS=$${OMNISIGHT_WORKERS:-$$(python3 -c 'import os; print(max(2, os.cpu_count() // 2))')}; exec python -m uvicorn backend.main:app --host 0.0.0.0 --port 8001 --workers $$WORKERS"
    ports:
      - "8011:8001"
    volumes:
      - staging-data:/app/data
      - staging-artifacts:/app/.artifacts
      # FX.3.1: raw /var/run/docker.sock mount removed — backend now talks
      # to the daemon via DOCKER_HOST → docker-socket-proxy:2375 (allowlisted).
    environment:
      - OMNISIGHT_DEBUG=false
      - OMNISIGHT_AUTH_MODE=strict
      - OMNISIGHT_ENV=staging
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
      - OMNISIGHT_INSTANCE_ID=staging-b
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    env_file:
      - .env.staging
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-frontend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend-a:8000
    ports:
      - "3010:3000"
    environment:
      - BACKEND_URL=http://backend-a:8000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      backend-a:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  staging-data:
    driver: local
  staging-artifacts:
    driver: local
