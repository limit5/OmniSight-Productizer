name: LLM Live Integration Tests (nightly)

# Z.7.7 (#NEW — 2026-04-29 audit)
#
# Nightly smoke of the three primary LLM providers (Anthropic / OpenAI /
# Google Gemini) to catch silent breaks caused by:
#   - LangChain version upgrades that reshape provider response objects
#   - Provider-side schema changes (tool-call format, streaming chunks)
#   - Multi-turn tool-use loops that stop closing the loop on one provider
#   - Nested schema silent-truncation across providers (Z.7.6)
#
# Schedule: 06:00 UTC = 14:00 Asia/Taipei.  Chosen to surface failures
# before the end of the Taipei working day, while spreading CI load away
# from the 17:00 UTC DR drill (G6) and 06:00 UTC CVE scan (N6).
#
# Budget guard: single-run budget < USD $0.50 (Z.7.7 + Z.7.9 spec).
# The ``budget-guard`` job checks a worst-case estimate AFTER the run and
# fails the workflow + writes a ``::error::`` annotation if exceeded.
# Z.7.9: two enforcement layers —
#   1. OMNISIGHT_CI_MAX_TOKENS_PER_CALL wired as max_tokens in every
#      LLM build call in the test file (no single call exceeds the cap).
#   2. OMNISIGHT_CI_MAX_ITER caps multi-turn iterations per test scenario.
# The estimator uses both caps to produce a tight upper bound.
#
# Secrets required (GitHub Actions repo secrets):
#   ANTHROPIC_API_KEY_CI   — Anthropic claude-3-haiku sandbox key
#   OPENAI_API_KEY_CI      — OpenAI gpt-3.5-turbo sandbox key
#   GOOGLE_API_KEY_CI      — Google gemini-1.5-flash sandbox key
#   OMNISIGHT_BACKEND_URL  — Base URL of the running backend (optional;
#                            skipped gracefully when absent)
#   OMNISIGHT_REPORTER_TOKEN — Pre-shared secret for the reporter POST
#                              endpoint (required when BACKEND_URL is set)
#
# The workflow does NOT fail the PR gate — it runs as an independent
# nightly job, and the ``on.push`` trigger fires only when this file or
# the live-test source changes, to keep edit→verify latency low.
#
# Z.7.8 (failure escalation): ``escalate`` job checks if the previous run
# also failed (via ``gh run list``) and, if so, invokes
# ``scripts/llm_adapter_debug_bot.py`` to auto-diagnose and file a GitHub
# issue. The backend POST handler also tracks ``consecutive_failures`` in
# SharedKV for the dashboard chip. Rate-limited to one open issue per streak.

on:
  schedule:
    # 06:00 UTC = 14:00 Asia/Taipei.
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manual trigger: re-run after a provider-SDK bump, or to verify a
    # fix without waiting for the next nightly window.
  push:
    # Fire on-push only when the workflow or the live-test source changes.
    branches: [main, master]
    paths:
      - ".github/workflows/llm-live-tests.yml"
      - "backend/tests/test_llm_adapter_live.py"
      - "backend/tests/conftest.py"
      - "backend/llm_adapter.py"
      - "scripts/ci_budget_guard.py"
      - "scripts/report_live_test_status.py"

permissions:
  contents: read
  # Z.7.8: the ``escalate`` job creates GitHub issues on consecutive failures.
  issues: write

concurrency:
  group: llm-live-tests
  # Never cancel an in-flight nightly run — the budget guard and reporter
  # must always complete to keep the dashboard chip fresh and prevent a
  # ghost "running" state on the workflow list.
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  # Per-call token ceiling (Z.7.9): wired as max_tokens in every LLM build
  # call in test_llm_adapter_live.py so no single API call exceeds this cap.
  # Also used by ci_budget_guard.py to compute the worst-case cost estimate.
  OMNISIGHT_CI_MAX_TOKENS_PER_CALL: "2000"
  # Max LLM round-trips per multi-turn test scenario (Z.7.9).
  # Prevents a runaway tool-calling loop from blowing the $0.50 budget.
  # Also used by ci_budget_guard.py in the estimate formula.
  OMNISIGHT_CI_MAX_ITER: "3"
  # Per-run USD budget ceiling.  Checked by ci_budget_guard.py.
  OMNISIGHT_CI_MAX_COST_USD: "0.50"

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # live-tests — the actual pytest run against all three providers.
  # Each provider class uses the cheapest available model in CI:
  #   Anthropic → claude-3-haiku-20240307
  #   OpenAI    → gpt-3.5-turbo
  #   Gemini    → gemini-1.5-flash-latest
  # (Test classes read OMNISIGHT_CI_* env vars for model override when set.)
  # ─────────────────────────────────────────────────────────────────────
  live-tests:
    name: LLM live integration tests (three providers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY_CI: ${{ secrets.ANTHROPIC_API_KEY_CI }}
      OPENAI_API_KEY_CI: ${{ secrets.OPENAI_API_KEY_CI }}
      GOOGLE_API_KEY_CI: ${{ secrets.GOOGLE_API_KEY_CI }}
      # CI model overrides — use cheapest/fastest tier so the run stays
      # within the $0.50 budget with room to spare.
      OMNISIGHT_CI_ANTHROPIC_MODEL: "claude-3-haiku-20240307"
      OMNISIGHT_CI_OPENAI_MODEL: "gpt-3.5-turbo"
      OMNISIGHT_CI_GOOGLE_MODEL: "gemini-1.5-flash-latest"
      # Z.7.9: token ceiling + iter cap are inherited from the top-level env
      # block; listed here explicitly so the live-tests job inherits them and
      # they appear in the step environment when inspecting the workflow run.

    outputs:
      exit_code: ${{ steps.run_tests.outputs.exit_code }}
      tests_run: ${{ steps.parse_report.outputs.tests_run }}
      tests_passed: ${{ steps.parse_report.outputs.tests_passed }}
      tests_skipped: ${{ steps.parse_report.outputs.tests_skipped }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          set -eu
          pip install --upgrade pip
          pip install -r requirements.txt
          # pytest-json-report is a test-only dep — not in requirements.in
          pip install "pytest-json-report==1.5.0" "pytest-timeout==2.3.1"

      - name: Run live integration tests
        id: run_tests
        # set +e: we capture the exit code instead of letting the step fail
        # immediately — the budget guard and reporter must always run.
        run: |
          set +e
          python -m pytest -m live \
            --json-report \
            --json-report-file=live-test-report.json \
            --timeout=60 \
            --tb=short \
            -v \
            backend/tests/test_llm_adapter_live.py
          PYTEST_EXIT=$?
          echo "exit_code=$PYTEST_EXIT" >> "$GITHUB_OUTPUT"
          echo "pytest exit code: $PYTEST_EXIT"

      - name: Parse test report summary
        id: parse_report
        if: always()
        run: |
          set -eu
          python - <<'PY'
          import json, os, sys
          path = "live-test-report.json"
          try:
              with open(path) as f:
                  data = json.load(f)
              s = data.get("summary", {})
              passed  = int(s.get("passed",  0))
              failed  = int(s.get("failed",  0))
              skipped = int(s.get("skipped", 0))
              tests_run = passed + failed
          except Exception:
              tests_run, passed, skipped = 0, 0, 0
          summary = os.environ.get("GITHUB_OUTPUT", "")
          if summary:
              with open(summary, "a") as f:
                  f.write(f"tests_run={tests_run}\n")
                  f.write(f"tests_passed={passed}\n")
                  f.write(f"tests_skipped={skipped}\n")
          PY

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-live-test-report-${{ github.run_id }}
          path: live-test-report.json
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  # budget-guard — verify the run stayed within the $0.50 per-run limit.
  # Runs after live-tests so we have the JSON report to inspect.
  # ─────────────────────────────────────────────────────────────────────
  budget-guard:
    name: Budget guard (< $0.50 USD)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: live-tests
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-live-test-report-${{ github.run_id }}
          path: .
        continue-on-error: true

      - name: Run budget guard
        run: |
          python scripts/ci_budget_guard.py live-test-report.json

  # ─────────────────────────────────────────────────────────────────────
  # report — write results to SharedKV via the backend reporter endpoint
  # + GitHub step summary.  Always runs so the dashboard chip stays fresh
  # regardless of whether tests passed or failed.
  # ─────────────────────────────────────────────────────────────────────
  report:
    name: Report live-test status to dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [live-tests, budget-guard]
    if: always()
    env:
      OMNISIGHT_BACKEND_URL: ${{ secrets.OMNISIGHT_BACKEND_URL }}
      OMNISIGHT_REPORTER_TOKEN: ${{ secrets.OMNISIGHT_REPORTER_TOKEN }}
      TEST_EXIT_CODE: ${{ needs.live-tests.outputs.exit_code }}
      GITHUB_RUN_ID: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-live-test-report-${{ github.run_id }}
          path: .
        continue-on-error: true

      - name: Report results to backend + step summary
        run: |
          python scripts/report_live_test_status.py live-test-report.json

      - name: Write workflow summary
        if: always()
        env:
          LIVE_STATUS: ${{ needs.live-tests.result }}
          BUDGET_STATUS: ${{ needs.budget-guard.result }}
          TESTS_RUN: ${{ needs.live-tests.outputs.tests_run }}
          TESTS_PASSED: ${{ needs.live-tests.outputs.tests_passed }}
          TESTS_SKIPPED: ${{ needs.live-tests.outputs.tests_skipped }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF

          ## Run summary

          | Job | Result |
          |-----|--------|
          | live-tests | \`$LIVE_STATUS\` |
          | budget-guard | \`$BUDGET_STATUS\` |

          Tests run: \`$TESTS_RUN\`  passed: \`$TESTS_PASSED\`  skipped: \`$TESTS_SKIPPED\`

          > Nightly schedule: 06:00 UTC (14:00 Asia/Taipei) — Z.7.7
          EOF

  # ─────────────────────────────────────────────────────────────────────
  # gate — final status gate; propagates test failure to the workflow
  # result so GitHub's UI correctly marks the run as failed when tests
  # fail.  Separated from ``report`` so the reporter always completes
  # even when this step fails.
  # ─────────────────────────────────────────────────────────────────────
  gate:
    name: Final gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [live-tests, budget-guard, report]
    if: always()

    steps:
      - name: Propagate test failure
        if: needs.live-tests.outputs.exit_code != '0' && needs.live-tests.outputs.exit_code != ''
        run: |
          echo "::error::LLM live tests failed (exit code ${{ needs.live-tests.outputs.exit_code }})"
          exit 1

      - name: Propagate budget guard failure
        if: needs.budget-guard.result == 'failure'
        run: |
          echo "::error::LLM live-test budget guard failed — estimated cost exceeded $OMNISIGHT_CI_MAX_COST_USD"
          exit 1

      - name: All checks passed
        run: |
          echo "LLM live integration tests: PASS"
          echo "Budget guard: PASS"

  # ─────────────────────────────────────────────────────────────────────
  # escalate — Z.7.8: fire llm-adapter-debug-bot when 2 consecutive
  # nightly runs fail.
  #
  # Runs only when the current live-tests job failed.  A Python step
  # queries ``gh run list`` to find the previous completed run of this
  # workflow and checks its conclusion.  If it also failed, we have 2
  # consecutive failures and the debug-bot is invoked to auto-diagnose
  # and open a GitHub issue.
  #
  # Rate-limiting: the bot itself checks for an existing open
  # ``llm-live-test-failure`` issue and skips creation if one is found.
  # This prevents issue spam when failures continue past the initial 2.
  # Close the issue once the root cause is resolved to re-arm escalation.
  #
  # BP.B note: once BP.B Guild infrastructure lands, the bot invocation
  # here will be replaced by a Guild dispatch call.  The script itself
  # is designed as a thin standalone wrapper that can be wrapped without
  # a logic rewrite.
  # ─────────────────────────────────────────────────────────────────────
  escalate:
    name: "Failure escalation — Z.7.8 (llm-adapter-debug-bot)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Wait for gate (which transitively waits for live-tests + budget-guard + report)
    # so SharedKV is updated before we potentially query the backend.
    needs: [live-tests, gate]
    # Only run when the live-tests job actually failed.
    if: >-
      always() &&
      needs.live-tests.outputs.exit_code != '0' &&
      needs.live-tests.outputs.exit_code != ''
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check if previous run also failed
        id: check_consecutive
        env:
          CURRENT_RUN_ID: ${{ github.run_id }}
        # Use Python to avoid shell quoting issues when working with gh JSON output.
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys

          current_id = int(os.environ.get("CURRENT_RUN_ID", "0"))
          repo = os.environ.get("GITHUB_REPOSITORY", "")

          result = subprocess.run(
              [
                  "gh", "run", "list",
                  "--workflow=llm-live-tests.yml",
                  "--repo", repo,
                  "--limit=10",
                  "--status=completed",
                  "--json=databaseId,conclusion",
              ],
              capture_output=True, text=True,
          )
          if result.returncode != 0:
              print(f"gh run list failed: {result.stderr}", file=sys.stderr)
              sys.exit(0)  # non-fatal: skip escalation on gh errors

          try:
              runs = json.loads(result.stdout)
          except json.JSONDecodeError:
              print("could not parse gh run list output", file=sys.stderr)
              sys.exit(0)

          # Completed runs are sorted newest-first.  Find the most recent
          # completed run that is NOT the current in-progress workflow.
          prev = next(
              (r for r in runs if r["databaseId"] != current_id),
              None,
          )

          output_file = os.environ.get("GITHUB_OUTPUT", "")

          if prev and prev["conclusion"] == "failure":
              prev_id = prev["databaseId"]
              print(
                  f"[escalate] previous run #{prev_id} also failed — "
                  "2 consecutive failures, triggering debug-bot"
              )
              if output_file:
                  with open(output_file, "a") as f:
                      f.write(f"consecutive_failure=true\n")
                      f.write(f"previous_run_id={prev_id}\n")
          else:
              prev_conc = prev["conclusion"] if prev else "no previous run"
              print(
                  f"[escalate] previous run conclusion: {prev_conc} — "
                  "not 2 consecutive failures, skipping escalation"
              )
              if output_file:
                  with open(output_file, "a") as f:
                      f.write("consecutive_failure=false\n")
                      f.write("previous_run_id=\n")
          PY

      - name: Run llm-adapter-debug-bot
        if: steps.check_consecutive.outputs.consecutive_failure == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/llm_adapter_debug_bot.py \
            --current-run-id  "${{ github.run_id }}" \
            --previous-run-id "${{ steps.check_consecutive.outputs.previous_run_id }}"

      - name: Escalation summary
        if: always()
        env:
          CONSECUTIVE: ${{ steps.check_consecutive.outputs.consecutive_failure }}
        run: |
          if [ "$CONSECUTIVE" = "true" ]; then
            echo "::warning::Z.7.8 escalation fired — 2 consecutive LLM live-test failures; llm-adapter-debug-bot invoked."
          else
            echo "Z.7.8 escalation check: no consecutive failure condition met."
          fi
