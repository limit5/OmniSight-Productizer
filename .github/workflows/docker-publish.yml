name: Docker Publish

# L10 #337 — on every `v*` tag push, build the backend + frontend
# container images and push them to GHCR under the repo owner's
# namespace. Two tags per image:
#   - :latest            — floating tag, moves with each release
#   - :<git-tag>          — immutable snapshot (e.g. v0.3.1)
#
# Multi-arch (linux/amd64 + linux/arm64): we publish an OCI image
# index so a single pulled tag resolves to the correct architecture
# on both cloud x86 VMs and ARM SBC / Apple-silicon hosts. The
# arm64 layer is built on amd64 runners via QEMU emulation
# (docker/setup-qemu-action). Emulated builds roughly double wall
# time — timeout-minutes bumped to 90 to cover the frontend
# (pnpm install + Next.js build) on emulated arm64.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (defaults to 'manual')"
        required: false
        default: "manual"

permissions:
  contents: read
  # GHCR push requires write access to GitHub Packages. Scoped to
  # the default GITHUB_TOKEN so no PAT management is required.
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: omnisight-backend
  FRONTEND_IMAGE: omnisight-frontend

jobs:
  publish:
    runs-on: ubuntu-latest
    # QEMU-emulated arm64 build roughly doubles wall time vs native
    # amd64 — 90 min leaves headroom for the frontend (pnpm install
    # + Next.js build) without blanket-canceling long but healthy runs.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: omnisight-backend
            dockerfile: Dockerfile.backend
          - name: frontend
            image: omnisight-frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      # GHCR requires the namespace (repository_owner) to be
      # lowercase even when the GitHub org/user has mixed case.
      - name: compute lowercase owner
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      # QEMU registers binfmt_misc handlers so the amd64 runner can
      # execute arm64 binaries during the build. Scoped to arm64 —
      # linux/amd64 runs natively on the runner and needs no emulation.
      - name: set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Publish a multi-arch OCI image index. A single `docker
          # pull ghcr.io/<owner>/<image>:<tag>` from an arm64 host
          # (Raspberry Pi / Ampere / Apple silicon CI) resolves to
          # the arm64 layer; x86_64 hosts resolve to amd64. Keeps
          # one pullable tag regardless of host architecture.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
