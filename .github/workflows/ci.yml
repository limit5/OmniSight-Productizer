name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# Phase 51 — pipeline:
#   lint              ruff (backend) + tsc --noEmit (frontend) + eslint
#   backend-tests     pytest sharded by folder + coverage thresholds
#   backend-migrate   alembic upgrade head from a clean DB
#   frontend-unit     vitest + coverage
#   frontend-e2e      playwright chromium (hard gate) + firefox / webkit
#                     (advisory until Chromium-only assumptions are
#                     confirmed clean across all three)
#   lockfile-drift    N1 — fail if requirements.in / package.json / Node
#                     version files change without their lockfile updated
# Each job has its own timeout so a hung step doesn't block the matrix.

jobs:

  lockfile-drift:
    # N1 — fail CI when a source-of-truth manifest changes but its lockfile
    # doesn't, OR when a stray npm/yarn lockfile reappears. Runs first so
    # developers see drift before the heavy jobs fan out.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install pip-tools
        run: pip install "pip-tools==7.5.3"
      - name: reject stray lockfiles (single-lockfile policy)
        run: |
          set -eu
          STRAY=""
          for f in package-lock.json yarn.lock; do
            if [ -f "$f" ]; then STRAY="$STRAY $f"; fi
          done
          if [ -n "$STRAY" ]; then
            echo "::error::Stray lockfile(s) found:$STRAY — pnpm-lock.yaml is canonical (N1 policy)"
            exit 1
          fi
      - name: pnpm lockfile up to date
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: pip-compile lockfile up to date
        # Regenerate into the same path so the autogenerated-header
        # comment (which embeds --output-file) is byte-identical to the
        # committed file. Then `git diff --exit-code` is the whole gate.
        run: |
          set -eu
          pip-compile --quiet --generate-hashes \
            --output-file=backend/requirements.txt \
            backend/requirements.in
      - name: working tree clean after lock regeneration
        run: |
          set -eu
          DIRTY="$(git status --porcelain | grep -E 'lock\.(json|yaml)$|requirements\.txt$' || true)"
          if [ -n "$DIRTY" ]; then
            echo "::error::Lockfile drift detected — someone edited requirements.in or package.json without regenerating the lockfile. Run 'pip-compile --generate-hashes backend/requirements.in' (Python) or 'pnpm install' (JS) and commit the result."
            echo "$DIRTY"
            git --no-pager diff backend/requirements.txt pnpm-lock.yaml | head -200
            exit 1
          fi

  renovate-config:
    # N2 — fail CI if `renovate.json` is invalid against the Renovate
    # schema. Cheap (~30s on warm cache) and catches typos before they
    # silently disable the entire bot. Runs in parallel with lint.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc" }
      - name: validate renovate.json
        run: npx --yes --package renovate@39 -- renovate-config-validator --strict renovate.json

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: install ruff
        run: pip install "ruff==0.7.4"
      - name: ruff check
        # Tech debt #3.b graduated ruff to a hard gate. Pre-existing
        # violations cleared by `ruff --fix` + a project-level
        # `ruff.toml` that ignores three intentional patterns
        # (E402 lazy imports, E741 ambiguous binders, E702 one-line
        # tuple swaps). New real-bug violations (F-series) fail CI.
        run: ruff check backend
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: tsc --noEmit
        # Tech debt TS B1-B3 cleared all 15 pre-existing errors;
        # tsc is now a real gate. New type errors fail CI.
        run: pnpm exec tsc --noEmit
      - name: eslint
        run: pnpm run lint || true

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Shard by directory so a slow folder doesn't blow the wall-
        # clock. Decision-related modules require 85% coverage; the
        # rest 60% (Phase 51 baseline; raise in v1 once gaps are
        # filled).
        shard:
          - { name: decision, paths: "tests/test_decision_engine.py tests/test_decision_rules.py tests/test_decision_rules_persistence.py tests/test_decision_api.py tests/test_decision_sse.py tests/test_ambiguity_budget.py tests/test_stuck_detector.py", min: 85 }
          - { name: pipeline, paths: "tests/test_pipeline.py tests/test_release.py tests/test_handoff.py", min: 60 }
          - { name: schema,   paths: "tests/test_schema.py tests/test_event_system.py tests/test_artifact_pipeline.py tests/test_artifacts.py", min: 60 }
          - { name: rest,     paths: "tests/", min: 60 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - name: pytest ${{ matrix.shard.name }}
        env:
          OMNISIGHT_DATABASE_PATH: /tmp/ci-omnisight-${{ matrix.shard.name }}.db
        run: |
          cd backend
          pytest ${{ matrix.shard.paths }} \
            --cov=backend \
            --cov-report=xml:../coverage-${{ matrix.shard.name }}.xml \
            --cov-fail-under=${{ matrix.shard.min }} \
            -q
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard.name }}
          path: coverage-${{ matrix.shard.name }}.xml
          retention-days: 7

  backend-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - name: alembic upgrade head (fresh DB)
        env:
          OMNISIGHT_DATABASE_PATH: /tmp/ci-alembic.db
        run: |
          rm -f /tmp/ci-alembic.db
          cd backend
          alembic upgrade head

  frontend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: vitest with coverage
        run: pnpm exec vitest run --coverage
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/
          retention-days: 7

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      # Matrix: chromium runs as a hard gate (required to pass).
      # firefox + webkit run as advisory until their first green
      # pass confirms no Chromium-only assumptions remain. Once clean,
      # drop `continue-on-error` below and the matrix becomes a hard
      # gate for all three — the same "warn first, harden later"
      # pattern tsc just graduated from.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    continue-on-error: ${{ matrix.browser != 'chromium' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: install playwright + system libs
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - name: run playwright (${{ matrix.browser }})
        env:
          # playwright.config.ts gates the extra projects behind this
          # env var — set it so the matrix browser is actually picked
          # up (`--project` needs the project to exist).
          OMNISIGHT_PW_BROWSERS: all
        run: pnpm exec playwright test --project=${{ matrix.browser }} --reporter=line
      - name: upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
