name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Phase 51 — pipeline:
#   lint              ruff (backend) + tsc --noEmit (frontend) + eslint
#   backend-tests     pytest sharded by folder + coverage thresholds
#   backend-migrate   alembic upgrade head from a clean DB
#   frontend-unit     vitest + coverage
#   frontend-e2e      playwright chromium (hard gate) + firefox / webkit
#                     (advisory until Chromium-only assumptions are
#                     confirmed clean across all three)
#   lockfile-drift    N1 — fail if requirements.in / package.json / Node
#                     version files change without their lockfile updated
# Each job has its own timeout so a hung step doesn't block the matrix.

jobs:

  lockfile-drift:
    # N1 — fail CI when a source-of-truth manifest changes but its lockfile
    # doesn't, OR when a stray npm/yarn lockfile reappears. Runs first so
    # developers see drift before the heavy jobs fan out.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install pip-tools
        run: pip install "pip-tools==7.5.3"
      - name: reject stray lockfiles (single-lockfile policy)
        run: |
          set -eu
          STRAY=""
          for f in package-lock.json yarn.lock; do
            if [ -f "$f" ]; then STRAY="$STRAY $f"; fi
          done
          if [ -n "$STRAY" ]; then
            echo "::error::Stray lockfile(s) found:$STRAY — pnpm-lock.yaml is canonical (N1 policy)"
            exit 1
          fi
      - name: pnpm lockfile up to date
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: pip-compile lockfile up to date
        # Regenerate into the same path so the autogenerated-header
        # comment (which embeds --output-file) is byte-identical to the
        # committed file. Then `git diff --exit-code` is the whole gate.
        # FX.6.7 (2026-05-04): the dev lockfile (requirements-dev.txt)
        # is regenerated AFTER the prod one because requirements-dev.in
        # consumes ``-c requirements.txt`` as a constraint — running
        # them in the wrong order would fail (constraint file missing)
        # or pin against a stale prod lock.
        run: |
          set -eu
          pip-compile --quiet --allow-unsafe --generate-hashes \
            --output-file=backend/requirements.txt \
            backend/requirements.in
          pip-compile --quiet --allow-unsafe --generate-hashes \
            --output-file=backend/requirements-dev.txt \
            backend/requirements-dev.in
      - name: working tree clean after lock regeneration
        run: |
          set -eu
          DIRTY="$(git status --porcelain | grep -E 'lock\.(json|yaml)$|requirements(-dev)?\.txt$' || true)"
          if [ -n "$DIRTY" ]; then
            echo "::error::Lockfile drift detected — someone edited requirements.in / requirements-dev.in / package.json without regenerating the lockfile. Run 'pip-compile --allow-unsafe --generate-hashes backend/requirements.in && pip-compile --allow-unsafe --generate-hashes backend/requirements-dev.in' (Python) or 'pnpm install' (JS) and commit the result."
            echo "$DIRTY"
            git --no-pager diff backend/requirements.txt backend/requirements-dev.txt pnpm-lock.yaml | head -200
            exit 1
          fi

  openapi-contract:
    # N3 — fail CI when FastAPI's OpenAPI schema drifts from the committed
    # `openapi.json` snapshot or the generated `lib/generated/api-types.ts`.
    # Rationale: the frontend pins its type contract to a file in git;
    # without this gate a backend schema change could quietly reshape the
    # wire format with no frontend compile error. Two gates here:
    #   1. snapshot  — regenerate openapi.json and `git diff --exit-code`
    #   2. ts types  — regenerate api-types.ts and diff likewise
    # Either diff means a PR author forgot to run `pnpm run openapi:sync`.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: regenerate openapi.json
        env:
          OMNISIGHT_DEBUG: "true"
        run: python scripts/dump_openapi.py
      - name: regenerate lib/generated/api-types.ts
        run: pnpm exec openapi-typescript openapi.json -o lib/generated/api-types.ts
      - name: fail on openapi drift
        run: |
          set -eu
          DIRTY="$(git status --porcelain -- openapi.json lib/generated/api-types.ts || true)"
          if [ -n "$DIRTY" ]; then
            echo "::error::OpenAPI contract drift — FastAPI schema changed but the committed snapshot / generated TS types were not refreshed. Run 'pnpm run openapi:sync' locally and commit the result."
            echo "$DIRTY"
            git --no-pager diff -- openapi.json | head -120
            git --no-pager diff -- lib/generated/api-types.ts | head -120
            exit 1
          fi
      # The repo-wide `tsc --noEmit` gate lives in the `lint` job; we
      # don't duplicate it here. The drift check above is the N3 gate.

  renovate-config:
    # N2 — fail CI if `renovate.json` is invalid against the Renovate
    # schema. Cheap (~30s on warm cache) and catches typos before they
    # silently disable the entire bot. Runs in parallel with lint.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc" }
      - name: validate renovate.json
        run: npx --yes --package renovate@39 -- renovate-config-validator --strict renovate.json

  auth-coverage:
    # S2-9 (#354) — secure-by-default auth baseline gate.
    # Parses every FastAPI router handler (AST only, no imports
    # so no DB / LLM / docker side effects), and fails the build
    # if a PR introduces a new UNGATED endpoint (one without
    # an auth Depends AND whose path is not on the allowlist
    # AUTH_BASELINE_ALLOWLIST in backend/auth_baseline.py).
    #
    # A baseline of the 454 pre-existing UNGATED endpoints lives
    # at docs/ops/auth_coverage_baseline.txt. That baseline is
    # intentionally a regression gate — CI passes when the live
    # UNGATED set equals or is a strict subset of it. Reducing
    # the baseline (by adding `Depends(...)` to a handler or
    # extending the allowlist with review) is the expected long-
    # term direction.
    #
    # Runs in parallel with `lint` + `renovate-config` + the
    # llm-adapter-firewall gate.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: check auth coverage against baseline
        run: python3 scripts/check_auth_coverage.py --check-baseline docs/ops/auth_coverage_baseline.txt

  llm-adapter-firewall:
    # N4 — fail CI if any file under `backend/` (other than
    # `backend/llm_adapter.py`) imports from `langchain*` or
    # `langgraph*`. The adapter is the single bridge between this
    # repo and LangChain; keeping every other call site behind it
    # means LangChain upgrades are a one-file change.
    #
    # Runs in parallel with `lint` and `renovate-config`. No Python
    # deps required — the script only uses stdlib `ast` to parse
    # import statements.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: check llm_adapter firewall
        run: python3 scripts/check_llm_adapter_firewall.py

  secret-pre-commit:
    # KS.4.2 — hard-gate PRs with the repository secret-scan
    # pre-commit hooks and the real scanner CLIs on PATH. The hooks
    # route through backend.security_scanning.secrets so reports never
    # persist raw secret values; any HIGH/CRITICAL finding exits nonzero
    # and blocks the pull request.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: install secret scanners
        run: |
          set -eu
          go install github.com/gitleaks/gitleaks/v8@v8.24.0
          go install github.com/trufflesecurity/trufflehog/v3@v3.88.8
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: install pre-commit
        run: pip install "pre-commit==4.0.1"
      - name: run secret scan hooks
        run: pre-commit run --all-files --show-diff-on-failure

  proxy-tests:
    # KS.3.6 — the customer-side BYOG proxy has its own Go test gate so
    # PR CI continuously verifies the proxy-hop p95 latency budget with
    # mTLS connection reuse, instead of only exercising Go tests during
    # release image builds.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: omnisight-proxy/go.mod
      - name: go test omnisight-proxy
        run: go test ./...
        working-directory: omnisight-proxy

  catalog-schema:
    # BS.1.3 — JSON-Schema lint for `configs/embedded_catalog/*.yaml`.
    # Validates every per-family yaml against `_schema.yaml`
    # (Draft 2020-12 JSONSchema) and enforces three cross-file
    # invariants the schema can't express on its own: filename ↔
    # `family` agreement, catalog-wide id uniqueness, and
    # `depends_on` reference resolution. Wired as a hard gate so
    # an operator-edited yaml that drifts from the alembic 0051
    # CHECK constraints lights up in the PR sidebar before the
    # backend-tests shard would catch it minutes later.
    #
    # Dedicated job (vs. folding into `lint`) because: (a) the deps
    # are different — pyyaml + jsonschema, not ruff — and pinning
    # them inline keeps the lint job lean; (b) the catalog editor's
    # mental model is "yaml file" not "backend Python", so a focused
    # job name in the PR check list is easier to interpret. Runs in
    # parallel with `lint` / `auth-coverage` / `llm-adapter-firewall`.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install yaml + jsonschema
        # Versions pinned to match the local dev environment that
        # authored the schema (jsonschema>=4.10 supports Draft 2020-12
        # via Draft202012Validator). PyYAML pinned to the same minor
        # as `backend/requirements.txt` for parser-behaviour parity.
        run: pip install "pyyaml==6.0.3" "jsonschema==4.23.0"
      - name: validate configs/embedded_catalog/*.yaml
        run: python3 scripts/check_catalog_schema.py

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: install ruff
        run: pip install "ruff==0.7.4"
      - name: ruff check
        # Tech debt #3.b graduated ruff to a hard gate. Pre-existing
        # violations cleared by `ruff --fix` + a project-level
        # `ruff.toml` that ignores three intentional patterns
        # (E402 lazy imports, E741 ambiguous binders, E702 one-line
        # tuple swaps). New real-bug violations (F-series) fail CI.
        run: ruff check backend
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: tsc --noEmit
        # Tech debt TS B1-B3 cleared all 15 pre-existing errors;
        # tsc is now a real gate. New type errors fail CI.
        run: pnpm exec tsc --noEmit
      - name: eslint
        run: pnpm run lint || true

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Shard by directory so a slow folder doesn't blow the wall-
        # clock. Decision-related modules require 85% coverage; the
        # rest 60% (Phase 51 baseline; raise in v1 once gaps are
        # filled).
        # `min` is the --cov-fail-under threshold. Subset shards can't
        # meaningfully threshold-check coverage because `--cov=backend`
        # measures ALL ~5,700 backend/*.py files but the shard only runs
        # a handful of tests — the subset will always report single-digit
        # coverage. Only the `rest` shard (which runs all tests) gets a
        # real floor. Subset shards still produce coverage-<name>.xml
        # artifacts for the upload step; a future row can combine them
        # with `coverage combine` + a single `coverage report --fail-under`
        # and restore the per-shard thresholds (decision 85, others 60).
        shard:
          - { name: decision, paths: "backend/tests/test_decision_engine.py backend/tests/test_decision_rules.py backend/tests/test_decision_rules_persistence.py backend/tests/test_decision_api.py backend/tests/test_decision_sse.py backend/tests/test_ambiguity_budget.py backend/tests/test_stuck_detector.py", min: 0 }
          - { name: pipeline, paths: "backend/tests/test_pipeline.py backend/tests/test_release.py backend/tests/test_handoff.py", min: 0 }
          - { name: schema,   paths: "backend/tests/test_schema.py backend/tests/test_event_system.py backend/tests/test_artifact_pipeline.py backend/tests/test_artifacts.py", min: 0 }
          - { name: rest,     paths: "backend/tests/", min: 60 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      # FX.6.7 (2026-05-04): pytest / pytest-asyncio / pytest-cov / respx
      # live in requirements-dev.txt (peeled out of the prod lockfile).
      - run: pip install --require-hashes -r backend/requirements-dev.txt
      - name: pytest ${{ matrix.shard.name }}
        env:
          OMNISIGHT_DATABASE_PATH: /tmp/ci-omnisight-${{ matrix.shard.name }}.db
          # H6 audit (2026-04-19): per-shard COVERAGE_FILE so the .coverage
          # binary data files don't overwrite each other when the
          # combine job downloads all four artifacts into one directory.
          # pytest-cov honours this env; the XML report still lands at
          # the path below.
          COVERAGE_FILE: .coverage.${{ matrix.shard.name }}
        # Run from repo root (not `cd backend`) so sys.path[0] is the
        # project root rather than `backend/`. (Pre-FX.9.3 the previous
        # `cd backend` put `backend/` on sys.path[0] and the project
        # module `backend/platform.py` (W0 #274 + P0 #285) shadowed
        # stdlib `platform` during pytest startup — uuid.py's
        # `import platform` → `backend/platform.py` without a `system()`
        # attr → AttributeError → exit 2 on every shard. FX.9.3
        # renamed it to `backend/platform_profile.py`, so the shadow
        # is gone; we keep the repo-root cwd as defence-in-depth.)
        #
        # `python3 -m pytest` (NOT the bare `pytest` CLI) is required so
        # python adds the repo root to sys.path[0] — otherwise
        # `from backend.xxx import ...` inside the tests hits
        # `ModuleNotFoundError: No module named 'backend'` at collection
        # time (CI has no editable install, no backend/__init__.py to
        # make it an implicit namespace package from pytest's rootdir).
        # `--rootdir=backend -c backend/pytest.ini` keeps coverage
        # config, testpaths, and asyncio_mode resolution identical to
        # the old cd-into-backend layout.
        run: |
          python3 -m pytest ${{ matrix.shard.paths }} \
            --rootdir=backend \
            -c backend/pytest.ini \
            --cov=backend \
            --cov-report=xml:coverage-${{ matrix.shard.name }}.xml \
            --cov-fail-under=${{ matrix.shard.min }} \
            -q
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard.name }}
          # H6 audit: upload both the XML report (for humans / codecov)
          # AND the raw .coverage data file (for the combine job). The
          # XML is a one-way projection — you can't recombine XMLs into
          # a merged report without parsing; the .coverage binary is the
          # source of truth for `coverage combine`.
          path: |
            coverage-${{ matrix.shard.name }}.xml
            .coverage.${{ matrix.shard.name }}
          retention-days: 7
          if-no-files-found: warn

  backend-coverage-combine:
    # H6 audit (2026-04-19): enforces the *aggregate* coverage floor
    # across all four shards. Per-shard thresholds are meaningless —
    # decision's 7 tests can't exercise 85% of ~5,700 backend files.
    # The rest shard runs everything, but its own --cov-fail-under=60
    # doesn't count work the other three shards did.
    # Combining the four .coverage data files gives the real full-suite
    # percentage, which is what we actually want to gate on.
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run even if one shard failed — we still want to know the aggregate
    # coverage number for the shards that did run. A failed shard
    # produces no .coverage file, and `coverage combine` skips missing
    # inputs gracefully; the final `--fail-under` is lower accordingly,
    # which is the correct signal (some tests didn't run, coverage
    # report should reflect that).
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: install coverage
        run: pip install "coverage[toml]==7.6.1"
      - name: download per-shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: shard-cov/
          merge-multiple: true
      - name: combine + report
        run: |
          set -eu
          # Move the per-shard .coverage.* files out of the download
          # subdirs (merge-multiple flattened them, but guard anyway).
          find shard-cov -name '.coverage.*' -exec cp -t . {} +
          ls -la .coverage.* || {
            echo "::warning::no per-shard .coverage files found — shards may have failed before writing data"
            exit 0
          }
          python3 -m coverage combine .coverage.*
          # 60 is the aggregate floor (H6 audit): `rest` shard alone hits
          # this when run solo; combining all four should comfortably
          # exceed it. If combined coverage drops below 60 something
          # went very wrong — either a shard didn't run, or a large
          # new module landed without any tests.
          python3 -m coverage report --rcfile=backend/pytest.ini --fail-under=60
          python3 -m coverage xml -o coverage-combined.xml --rcfile=backend/pytest.ini
      - name: upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage-combined.xml
          retention-days: 14

  backend-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - name: alembic upgrade head (fresh DB)
        env:
          OMNISIGHT_DATABASE_PATH: /tmp/ci-alembic.db
        run: |
          rm -f /tmp/ci-alembic.db
          cd backend
          alembic upgrade head

  frontend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      # Workaround: vitest 4.x pulls rolldown@1.0.0-rc.15 which ships
      # platform-specific native bindings as optionalDependencies. pnpm
      # + `--frozen-lockfile` + the setup-node cache can conspire to
      # skip the current-platform binding (npm bug
      # https://github.com/npm/cli/issues/4828 inherited by pnpm's
      # compat layer), leaving rolldown with "Cannot find native
      # binding". Install the linux-x64-gnu binding explicitly (no
      # --save so lockfile stays frozen). Drop this step once vitest /
      # rolldown ship a post-rc.15 release that guarantees platform
      # binding installation.
      - name: ensure rolldown linux-x64 binding (vitest 4.x workaround)
        run: pnpm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.15
      - name: vitest with coverage
        run: pnpm exec vitest run --coverage
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/
          retention-days: 7

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      # Matrix: chromium runs as a hard gate (required to pass).
      # firefox + webkit run as advisory until their first green
      # pass confirms no Chromium-only assumptions remain. Once clean,
      # drop `continue-on-error` below and the matrix becomes a hard
      # gate for all three — the same "warn first, harden later"
      # pattern tsc just graduated from.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    continue-on-error: ${{ matrix.browser != 'chromium' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --require-hashes -r backend/requirements.txt
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: ".nvmrc", cache: pnpm }
      - run: pnpm install --frozen-lockfile --prefer-offline
      # Same rolldown linux-x64 workaround as frontend-unit (vitest 4.x
      # pulls rolldown which can skip its platform binding under
      # --frozen-lockfile; see that job for the full rationale).
      - name: ensure rolldown linux-x64 binding (vitest 4.x workaround)
        run: pnpm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.15
      - name: install playwright + system libs
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - name: run playwright (${{ matrix.browser }})
        env:
          # playwright.config.ts gates the extra projects behind this
          # env var — set it so the matrix browser is actually picked
          # up (`--project` needs the project to exist).
          OMNISIGHT_PW_BROWSERS: all
          # H7 audit (2026-04-19): use OMNISIGHT_CI_MODE — a dedicated
          # bypass flag that only relaxes `validate_startup_config`'s
          # strict gate — instead of repurposing OMNISIGHT_DEBUG.
          # DEBUG=true also flips verbose logging and dev-only code
          # paths that CI doesn't need. CI_MODE is narrow: it tells
          # validate_startup_config "we're in a sandbox, no
          # ANTHROPIC_API_KEY, AUTH_MODE=open is fine", nothing else.
          # Safe: the CI process is ephemeral, not exposed.
          OMNISIGHT_CI_MODE: "true"
          # Paired with OMNISIGHT_CI_MODE — even in CI we don't
          # want the noisy "anthropic provider has no key" log line on
          # every request. `ollama` is the zero-config fallback the
          # config layer treats as "no key needed" (agents/llm.py).
          OMNISIGHT_LLM_PROVIDER: ollama
        run: pnpm exec playwright test --project=${{ matrix.browser }} --reporter=line
      - name: upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
