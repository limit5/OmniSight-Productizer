name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Run tests
        run: python -m pytest backend/tests/ -q --tb=short
        env:
          OMNISIGHT_WORKSPACE: ${{ github.workspace }}

      - name: Create release bundle
        run: |
          python -c "
          import asyncio, os
          from backend.release import create_release_bundle
          version = os.environ.get('RELEASE_VERSION', '0.0.0')
          result = asyncio.run(create_release_bundle(version=version))
          print(f'Bundle: {result[\"name\"]} ({result[\"size\"]} bytes)')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'bundle_path={result[\"file_path\"]}\n')
          "
        id: bundle
        env:
          OMNISIGHT_WORKSPACE: ${{ github.workspace }}
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Upload to GitHub Release
        run: |
          gh release create "$TAG" \
            --title "OmniSight $TAG" \
            --generate-notes \
            "$BUNDLE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          BUNDLE: ${{ steps.bundle.outputs.bundle_path }}
