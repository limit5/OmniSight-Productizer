version: "3.9"

# Production compose — optimized images, named volumes, restart policy
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - omnisight-data:/app/data
      - omnisight-artifacts:/app/.artifacts
      - omnisight-sdks:/app/.sdks
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OMNISIGHT_DEBUG=false
      - OMNISIGHT_AUTH_MODE=strict
      - OMNISIGHT_ENV=production
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Phase 52 — Observability sidecars. Enable with `--profile observability`.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - omnisight-prom:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - backend
    restart: always

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - omnisight-grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  omnisight-data:
    driver: local
  omnisight-artifacts:
    driver: local
  omnisight-sdks:
    driver: local
  omnisight-prom:
    driver: local
  omnisight-grafana:
    driver: local
