version: "3.9"

# Production compose — image-first deployment.
#
# Pre-built images live on GHCR (published by .github/workflows/docker-publish.yml).
# `docker compose -f docker-compose.prod.yml up -d` will:
#   1. Use the local image if already cached.
#   2. Otherwise try to pull from `ghcr.io/${OMNISIGHT_GHCR_NAMESPACE}/omnisight-{backend,frontend}:${OMNISIGHT_IMAGE_TAG}`.
#   3. Fall back to a local `docker build` from the Dockerfiles below
#      (native Compose behavior when both `image:` and `build:` are set).
#
# Knobs (override via env / .env):
#   OMNISIGHT_GHCR_NAMESPACE  — lowercase GitHub org/user handle that
#                               owns the GHCR packages. Default
#                               `your-org` is a placeholder — the pull
#                               will fail and Compose will transparently
#                               fall back to a local build, so first-run
#                               works out of the box.
#   OMNISIGHT_IMAGE_TAG       — image tag to pull. Default `latest`.
#                               Pin to a `v*` release tag for
#                               reproducible deploys.
#
# To force a rebuild (e.g. after editing a Dockerfile locally):
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  # C1 audit fix (2026-04-19) — Docker API allowlist proxy.
  #
  # Backend containers used to mount /var/run/docker.sock directly, which
  # meant any RCE in the FastAPI app gave the attacker full daemon
  # control (→ `docker run --privileged -v /:/host` = full host root).
  # This sidecar sits in front of the socket and only forwards a minimal
  # verb allowlist that the legitimate sandbox manager needs.
  #
  # The socket itself is mounted :ro on the proxy — Docker UNIX sockets
  # don't actually enforce :ro (all API calls are "writes" from the FS
  # POV), but the attribute is kept as a policy marker.
  #
  # NO `ports:` — this service is internal-only, reachable only via the
  # compose `default` network as `docker-socket-proxy:2375`.
  #
  # Allowlist rationale:
  #   CONTAINERS=1 — list / inspect / create / remove / start / stop
  #                  (backend/container.py primitives for sandbox mgmt)
  #   EXEC=1       — docker exec inside the sandbox containers
  #   IMAGES=1     — sandbox image inspect + pull
  #   POST=1       — required for any mutating endpoint (create/start/exec)
  # Explicit denies (default but pinned for audit trail):
  #   BUILD / AUTH / COMMIT / CONFIGS / DISTRIBUTION / EVENTS / NETWORKS
  #   / NODES / PLUGINS / SERVICES / SESSION / SWARM / SYSTEM / TASKS
  #   / VOLUMES / INFO — none of these are needed by the app today.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    restart: always
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - EXEC=1
      - POST=1
      - BUILD=0
      - AUTH=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EVENTS=0
      - INFO=0
      - NETWORKS=0
      - NODES=0
      - PLUGINS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
      - VOLUMES=0
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # H4-followup: partial hardening. The tecnativa image's entrypoint
    # writes haproxy.cfg next to a template bundled in the image at
    # /usr/local/etc/haproxy/ — tmpfs-ing that dir hides the template
    # itself (breaks startup), and a pure read_only:true stops the
    # write. So we keep rootfs writable here but still drop caps +
    # no-new-privileges. The container's only real powers are (a) read
    # /var/run/docker.sock (mounted :ro), (b) speak HTTP on :2375 —
    # neither needs caps or setuid.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "2", "http://127.0.0.1:2375/_ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # G2 #2 — HA-02 dual backend replicas for rolling-restart + reverse-proxy HA.
  #
  # Topology (see deploy/reverse-proxy/Caddyfile G2 #1):
  #   caddy :443 ──► { backend-a:8000, backend-b:8001 }  (round-robin, /readyz eject)
  #
  # Both replicas run the same image and mount the same three named volumes
  # (`omnisight-data`, `omnisight-artifacts`, `omnisight-sdks`) so any request
  # may land on either replica. The upstream pool is truly symmetric — a
  # prerequisite for the rolling-restart flow in scripts/deploy.sh (G2 #3)
  # where one replica is drained while the other serves 100 % of traffic.
  #
  # SQLite caveat (closed-loop note): the shared `omnisight-data` volume means
  # both replicas talk to the same `omnisight.db`. SQLite in WAL mode supports
  # many readers + one writer, so concurrent write contention *will* surface
  # `database is locked` errors under load. G4 (HA-04) migrates to PostgreSQL
  # and removes the constraint; for G2 this plumbing-level dual-replica is
  # acceptable because rolling restart only leaves one replica live at a time
  # during the cutover window.
  #
  # Port convention (contract with Caddyfile upstream block):
  #   backend-a → listens on container port 8000 (uvicorn --port 8000, default CMD).
  #   backend-b → listens on container port 8001 (uvicorn --port 8001, command-override).
  # Keeping distinct internal ports lets the Caddy upstream stanza address
  # them unambiguously by service name + port, and host-port exposure (8000/8001)
  # remains operator-friendly for direct `curl` smoke of each replica.
  backend-a:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-backend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - omnisight-data:/app/data
      - omnisight-artifacts:/app/.artifacts
      - omnisight-sdks:/app/.sdks
      # Audit C1 (2026-04-19): host socket mount REMOVED — was a Tier-0
      # container-escape primitive (any Python RCE in backend could open
      # /var/run/docker.sock and `docker run --privileged -v /:/host`).
      # Backend now talks to the docker daemon through the allowlisted
      # `docker-socket-proxy` sidecar via DOCKER_HOST env (see below +
      # the proxy service definition). Historic mount for reference:
      #   - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OMNISIGHT_DEBUG=false
      - OMNISIGHT_AUTH_MODE=strict
      - OMNISIGHT_ENV=production
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
      - OMNISIGHT_INSTANCE_ID=backend-a
      # C1 fix: route Docker-API traffic through the allowlisted proxy
      # (see docker-socket-proxy service). The Python SDK in
      # host_metrics.py honours DOCKER_HOST; if/when backend/container.py
      # gets wired up in prod it does too (subprocess inherits env).
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Bootstrap Step-5 (parallel-health-check) frontend probe URL.
      # Without this override the probe reads `settings.frontend_origin`
      # which is the PUBLIC CF-tunnel URL (`https://ai.sora-dev.app`),
      # so every 3s poll would leave the compose network, hit CF edge,
      # and come back via the tunnel — adding ~280 ms baseline latency
      # and occasional >3s timeout spikes that flipped the wizard row
      # red→green→red. Internal docker DNS resolves `frontend` to the
      # Next.js container directly, single-hop and <10 ms stable.
      - OMNISIGHT_FRONTEND_URL=http://frontend:3000
    env_file:
      - .env
    # Legacy `backend` DNS alias — preserves the single-replica scrape target
    # in configs/prometheus.yml (`backend:8000`) without touching files outside
    # this compose diff. A follow-up commit can teach prometheus.yml to scrape
    # both replicas (backend-a + backend-b) and drop this alias.
    #
    # Phase-1 wire-up (2026-04-20): backend is now dual-homed. ``default`` is
    # still the productizer-internal network (talks to caddy / frontend /
    # cloudflared / docker-socket-proxy). ``ai_core`` is the external network
    # owned by the sibling ``omnisight-ai-core`` compose stack and carries
    # two shared-infra services we now need as soft dependencies:
    #
    #   * ``ai_cache`` (redis:7-alpine) — backs I9 rate limiter + I10
    #     shared_state (SSE fan-out, parallel_in_flight, AIMD budget,
    #     etc.). Reaches it via DNS name ``ai_cache`` on port 6379.
    #   * future: Gemma4 local LLM endpoint (phase 2).
    #
    # When ai-core is down, the backend falls back to in-memory state
    # (rate_limit.py + shared_state.py both detect + log + degrade). So the
    # dep is *soft* — production keeps serving, but quota is per-replica
    # (halved) and SSE cross-worker delivery drops to local-only.
    networks:
      default:
        aliases:
          - backend
      ai_core: {}
      # Phase-3 sub-phase 3-B (2026-04-20): attach to the pg-ha stack's
      # network so DATABASE_URL ``postgresql+asyncpg://pg-primary/...``
      # resolves to the HA primary. Declared ``external: true`` below
      # so compose up/down on productizer never tears down the PG pair
      # (that lifecycle is owned by deploy/postgres-ha/docker-compose.yml).
      db_ha: {}
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    restart: always
    # H4-followup: runtime hardening. Non-root already via Dockerfile
    # USER app (commit 2fb03dde). These knobs complete the defence-
    # in-depth: setuid paths blocked, root caps dropped, root
    # filesystem frozen (the three named volumes stay mutable).
    # /app/.agent_workspaces is ephemeral per-task — tmpfs is the
    # right fit (resets on container restart, which matches the
    # task lifetime contract).
    read_only: true
    tmpfs:
      - /tmp                         # uvicorn / Python tempfile
      - /app/.agent_workspaces:uid=65532,gid=65532  # per-task ephemeral scratch
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend-b:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-backend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Override the baked-in CMD (port 8000) so backend-b listens on 8001 and
    # matches the Caddyfile upstream contract. Worker-count formula mirrors
    # the Dockerfile default so `OMNISIGHT_WORKERS` override works the same.
    # Note on `$$` escapes: docker-compose does its own variable interpolation
    # *before* passing the string to the container's shell, so every `$` that
    # must survive to the in-container `sh -c` is doubled. Single `$` would
    # be consumed at compose-config time and break the OMNISIGHT_WORKERS
    # override + the `$(python3 ...)` worker-count fallback.
    command:
      - "sh"
      - "-c"
      - "WORKERS=$${OMNISIGHT_WORKERS:-$$(python3 -c 'import os; print(max(2, os.cpu_count() // 2))')}; exec python -m uvicorn backend.main:app --host 0.0.0.0 --port 8001 --workers $$WORKERS --no-access-log"
    ports:
      - "8001:8001"
    volumes:
      - omnisight-data:/app/data
      - omnisight-artifacts:/app/.artifacts
      - omnisight-sdks:/app/.sdks
      # Audit C1 (2026-04-19): host socket mount REMOVED — was a Tier-0
      # container-escape primitive (any Python RCE in backend could open
      # /var/run/docker.sock and `docker run --privileged -v /:/host`).
      # Backend now talks to the docker daemon through the allowlisted
      # `docker-socket-proxy` sidecar via DOCKER_HOST env (see below +
      # the proxy service definition). Historic mount for reference:
      #   - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OMNISIGHT_DEBUG=false
      - OMNISIGHT_AUTH_MODE=strict
      - OMNISIGHT_ENV=production
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
      - OMNISIGHT_INSTANCE_ID=backend-b
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # See backend-a's note above — internal docker URL for Step-5
      # parallel-health-check frontend probe, avoiding CF tunnel loop.
      - OMNISIGHT_FRONTEND_URL=http://frontend:3000
    env_file:
      - .env
    # Dual-home same as backend-a — see backend-a's networks: block
    # for the Phase-1 rationale (ai-core shared-infra network carrying
    # ai_cache + future Gemma4) and Phase-3 3-B rationale (db_ha for
    # DATABASE_URL → pg-primary cutover).
    networks:
      default: {}
      ai_core: {}
      db_ha: {}
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    restart: always
    # H4-followup: hardening (see backend-a for rationale).
    read_only: true
    tmpfs:
      - /tmp
      - /app/.agent_workspaces:uid=65532,gid=65532
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # G2 #4 — Caddy reverse proxy for zero-downtime rolling restart.
  # Sits in front of both backend replicas with /readyz health checks.
  # Frontend SSR and browser API calls both route through Caddy so
  # neither path is affected when one backend replica restarts.
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./deploy/reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - omnisight-caddy-data:/data
      - omnisight-caddy-config:/config
    # Caddyfile site block expands `{$OMNISIGHT_PUBLIC_HOSTNAME:localhost}`
    # — the tunnel-fronted Host header must match, or Caddy returns 404.
    # Default `localhost` stays operative for direct-loopback smoke; prod
    # `.env` sets this to the real public hostname (e.g. sora-dev.app).
    environment:
      - OMNISIGHT_PUBLIC_HOSTNAME=${OMNISIGHT_PUBLIC_HOSTNAME:-localhost}
    depends_on:
      backend-a:
        condition: service_healthy
      backend-b:
        condition: service_healthy
    restart: always
    # H4-followup: hardening. Caddy binds :80 + :443 (privileged ports)
    # and issues/saves internal-CA certs — it needs NET_BIND_SERVICE
    # back, plus SETUID/SETGID for its own internal privilege drop,
    # DAC_OVERRIDE for writing the cert cache at first boot. The
    # named volumes (caddy-data, caddy-config) handle writable state,
    # so read_only:true is safe.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    # Probe Caddy's Docker-internal :8000 block — that path is a plain HTTP
    # reverse proxy into the backend pool (no TLS, no redirect). Probing
    # `:80/` fails because `:80` issues a 301 → `https://...` and wget
    # inside the alpine image has no CA bundle for Caddy's self-signed
    # `issuer internal` cert, so the follow-up TLS verify errors.
    # `--spider` + `-q` returns 0 on any non-error response.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "2", "http://localhost:8000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/${OMNISIGHT_GHCR_NAMESPACE:-your-org}/omnisight-frontend:${OMNISIGHT_IMAGE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Frontend SSR routes through Caddy so it survives backend
        # rolling restart — Caddy ejects unhealthy replicas from the
        # upstream pool and routes to the surviving one.
        BACKEND_URL: http://caddy:8000
    ports:
      - "3000:3000"
    environment:
      # SSR proxy → Caddy (health-aware) instead of backend-a (fragile)
      - BACKEND_URL=http://caddy:8000
      - NODE_ENV=production
      # Next.js 13+ standalone server.js binds to $HOSTNAME. Docker sets
      # HOSTNAME=<container-id>, which resolves to the container's private
      # network IP — so `localhost:3000` inside the container has no
      # listener and the compose `wget` healthcheck always fails. Forcing
      # 0.0.0.0 makes the server listen on every interface (container IP
      # AND loopback), so the healthcheck and `docker exec` smoke both work.
      - HOSTNAME=0.0.0.0
      # M6 audit (2026-04-19): heap cap tightened from 4 GB → 1 GB.
      # 4 GB was chosen to tolerate error-burst GC pressure during
      # a backend-unreachable window, but the real constraint isn't
      # GC speed — it's DoS headroom. A malicious or buggy request
      # that triggers a large JSON parse can now grow the heap from
      # the V8 default (~1.7 GB) towards 4 GB before OOM kill; at
      # 1000 concurrent requests an attacker could burn host RAM.
      # 1 GB is plenty for legitimate SSR (measured steady-state
      # ~200 MB) and cuts the worst-case x4. Paired with mem_limit
      # 2 GB below as a hard ceiling the kernel enforces — so even
      # if the V8 cap is evaded the container is capped.
      - NODE_OPTIONS=--max-old-space-size=1024
    depends_on:
      caddy:
        condition: service_healthy
    restart: always
    # H4-followup: hardening. Non-root already via Dockerfile USER app
    # (commit 445ab13a). Next.js standalone server.js writes only to
    # stdout/stderr (docker logs) at runtime, so read_only rootfs
    # works as-is — no cache writes to /app/.next at runtime (the
    # cache exists at image-build time, not runtime).
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # M6 audit: hard host-level cap on memory. Complements the V8
    # heap cap above — if something bypasses V8 (large buffers
    # outside the heap) or if Node spawns a child, Linux OOM-
    # killer stops runaway growth before it starves other services.
    mem_limit: 2g
    mem_reservation: 512m
    # Root `/` returns HTTP 307 (auth-gate → /setup-required or /login) which
    # makes `wget -qO-` exit non-zero even though the server is clearly up.
    # `--spider` accepts 2xx/3xx. Use `127.0.0.1` NOT `localhost` — busybox
    # wget prefers IPv6 (`::1`) and Next.js standalone binds `0.0.0.0`
    # (IPv4 only) so localhost resolves to `::1` and connection is refused.
    # Note: busybox wget only supports `-T SEC` for timeout (no `--timeout=`
    # or `--tries=` — those get parsed as URLs).
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "-T", "3", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Cloudflare Tunnel — optional public-internet connector. Enable with
  # `docker compose --profile tunnel up -d cloudflared`. CF edge
  # terminates TLS; the tunnel forwards plain HTTP to an internal
  # service inside this compose network.
  #
  # Token lives in `.env` as OMNISIGHT_CLOUDFLARE_TUNNEL_TOKEN; the
  # tunnel itself + its ingress rules live in the Cloudflare Zero Trust
  # dashboard (Networks → Tunnels → Public Hostnames).
  #
  # Ingress to configure in CF dashboard — one Public Hostname per
  # subdomain you want to expose. CANONICAL default (Phase-3 P2,
  # 2026-04-20):
  #   Subdomain: ai   Domain: <your-zone>   (e.g. ai.sora-dev.app)
  #   Service — Type: HTTP
  #   Service — URL:  caddy:8080       ← NOT frontend:3000
  #
  # Why `caddy:8080` (edge path router — the canonical pattern):
  #
  #   Caddy's :8080 block (see deploy/reverse-proxy/Caddyfile) splits
  #   traffic by path at the reverse-proxy layer:
  #       /api/v1/*  → backend-a / backend-b (with flush_interval -1)
  #       /*         → frontend:3000 (Next.js SSR)
  #
  #   This matches how Kubernetes Ingress, AWS ALB target-groups, and
  #   Cloudflare Workers route split mixed-origin apps — the reverse-
  #   proxy layer owns routing, not the app server.
  #
  # Why NOT `frontend:3000` any more (the Phase-3 P2 root cause):
  #
  #   Routing to frontend:3000 forced `/api/v1/*` through Next.js's
  #   `rewrites()` API. Next.js's rewrite proxy buffers streaming
  #   responses (SSE / NDJSON / chunked) — the Node HTTP client sitting
  #   between rewrite matcher and the upstream doesn't honour
  #   `flush_interval`-style hints, so Server-Sent Events on
  #   `/api/v1/events` opened with 200 + headers but the body didn't
  #   reach the browser for 60+ s. EventSource then treated the
  #   connection as dead and reconnected in a rapid loop, burned the
  #   per-IP rate-limit quota (free plan: 60/60s), tripped the login
  #   endpoint into 429, and bounced the operator back to /login. The
  #   bug is a documented Next.js limitation, not a regression.
  #
  # Why NOT `caddy:80` / `caddy:443`:
  #   - :80 always 301s to https → redirect loop through the tunnel
  #   - :443 presents an `internal`-CA cert the tunnel can accept but
  #     is unnecessary overhead (TLS inside TLS inside QUIC) when the
  #     tunnel already terminates the public HTTPS at CF edge
  #
  # Why NOT `caddy:8000`:
  #   :8000 is the dedicated internal backend-proxy the frontend
  #   container uses as `BACKEND_URL` for its SSR fetches. Repurposing
  #   it as a path router would break Caddy's own container
  #   healthcheck (`wget http://localhost:8000/readyz`) because the
  #   catch-all fallback would send `/readyz` to frontend:3000.
  #
  # Rollback: change CF dashboard service URL back to
  # `http://frontend:3000`. The broken-streaming symptom will return
  # along with it — keep :8080 listed here so future operators know
  # the canonical target.
  cloudflared:
    # H3 audit (2026-04-19): pinned to the exact digest of the
    # cloudflare/cloudflared:latest tag at go-live time. `:latest` is a
    # supply-chain risk — a compromised upstream could push a poisoned
    # image that `docker compose up` would pull without noticing, and
    # the TUNNEL_TOKEN would flow straight to the attacker's C2.
    # Re-pin periodically: check CF release notes + re-run
    #   docker pull cloudflare/cloudflared:latest
    #   docker inspect --format='{{index .RepoDigests 0}}' cloudflare/cloudflared:latest
    # then update the @sha256: part below.
    image: cloudflare/cloudflared@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${OMNISIGHT_CLOUDFLARE_TUNNEL_TOKEN:?set OMNISIGHT_CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      caddy:
        condition: service_healthy
    restart: always
    # H4-followup: hardening. cloudflared is upstream-maintained by
    # Cloudflare (digest-pinned per H3 commit 7b4afbb3). It maintains
    # internal state for QUIC connections, so we leave rootfs
    # writable (skipping read_only:true) to avoid breaking the tunnel
    # in subtle ways. Cap drops + no-new-privileges still apply.
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # quic client may bind low source ports

  # Phase 52 — Observability sidecars. Enable with `--profile observability`.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - omnisight-prom:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - backend-a
      - backend-b
    restart: always

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - omnisight-grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  omnisight-data:
    driver: local
  omnisight-artifacts:
    driver: local
  omnisight-sdks:
    driver: local
  omnisight-caddy-data:
    driver: local
  omnisight-caddy-config:
    driver: local
  omnisight-prom:
    driver: local
  omnisight-grafana:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────
# Phase-1 wire-up: the backend replicas reach ai_cache (Redis) and — in
# phase 2 — Gemma4 inference via the external ``omnisight-ai-core`` stack's
# network. Declared ``external: true`` so this compose file does not
# create or destroy the network; it only attaches. The implicit
# ``default`` network (created by compose from the project name) stays
# as-is for all other intra-stack wiring (caddy / frontend / cloudflared
# / docker-socket-proxy); it is not declared here so compose keeps the
# default behaviour (auto-create, project-scoped name).
networks:
  ai_core:
    external: true
    name: omnisight-ai-core_omnisight_net
  # Phase-3 sub-phase 3-B (2026-04-20) — the PostgreSQL HA pair lives
  # in a separate compose project (deploy/postgres-ha/docker-compose.yml).
  # ``external: true`` + pinned ``name`` so productizer lifecycle ops
  # (up / down / rm) never touch the DB network that the pg-primary /
  # pg-standby containers live on. The pg-ha network is created by
  # ``docker compose -f deploy/postgres-ha/docker-compose.yml up``.
  db_ha:
    external: true
    name: postgres-ha_pg-ha
