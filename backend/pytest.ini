[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Phase 51: coverage settings. Targets the most safety-critical
# modules at 85%, the rest at 60%. Run with `pytest --cov` or via
# CI which always passes --cov-fail-under.
[coverage:run]
source = backend
omit =
    backend/tests/*
    backend/.venv/*
    backend/__pycache__/*
    backend/docker/*

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
precision = 1
show_missing = false
skip_covered = false
