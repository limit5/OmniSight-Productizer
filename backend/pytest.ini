[pytest]
asyncio_mode = auto
# pytest-asyncio 1.x deprecated the implicit fixture-loop scope; future
# versions default to function. Pin it explicitly so the warning goes
# away and the contract stays stable across upgrades.
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — registered so pytest ≥ 7 stops emitting
# PytestUnknownMarkWarning at collection time (audit H1). All 11 live
# under backend/tests/test_uvc_gadget.py, which partitions the UVC
# Gadget conformance suite along the axes below. Keep this list in
# sync with the decorators in that file.
markers =
    slow: wall-clock-heavy test (E2E stress, multi-second duration). Skip via ``-m 'not slow'`` when running a fast CI subset.
    p0: production-critical CI gate — MUST NOT be skipped. Y-prep.1 (#287) promoted the three Gerrit dispatcher routing tests (``TestGerritEventRouting.test_patchset_created_dispatches_to_on_patchset_created`` / ``test_comment_added_dispatches_to_on_comment_added`` / ``test_change_merged_dispatches_to_on_change_merged``) to this marker so a future ``@pytest.mark.skip`` / ``@pytest.mark.skipif(True, ...)`` / inline ``pytest.skip()`` on any of them fails collection or converts the Skipped outcome into a failure. Enforcement lives in ``backend/tests/conftest.py::pytest_collection_modifyitems`` + ``pytest_runtest_makereport`` — see the docstrings there for the policy rationale. Run the gate explicitly via ``pytest -m p0``.
    descriptor: UVC descriptor-chain conformance (VC/VS interface, extension-unit, still-image)
    lifecycle: UVC gadget bind / unbind / hot-reset lifecycle transitions
    payload: iso / bulk payload framing, packet sizing, and error recovery
    error_handling: stall conditions, malformed requests, and recovery paths
    gadgetfs: FunctionFS + gadgetfs control-endpoint behaviours
    extension_unit: XU (Extension Unit) control-selector round-trips
    enums: USB Video Class enumerated constants (request codes, entity types)
    compliance: USB-IF + UAC/UVC spec compliance checks
    still_image: still-image capture trigger + VS_STILL_IMAGE_FRAME_TYPE payload
    rest_api: REST bridge for gadget control / introspection
    config: runtime + persisted gadget configuration surface
    # SKILL-IPCAM (#219) — RTSP server scaffold axes
    rtsp_backend: RTSP backend detection + preference-ordered selection (live555 / gstreamer / stub)
    rtsp_config: RTSPServerConfig validation — ports, sessions, realm, timeout
    rtsp_mount: RTSP mount-point add / remove / get / list / path normalisation
    rtsp_session: RTSP session FSM (INIT → READY → PLAYING → PAUSED → TEARDOWN) + timeout
    rtsp_transport: RFC 2326 Transport header parsing / serialisation
    rtsp_method: RTSP method dispatch (OPTIONS / DESCRIBE / SETUP / PLAY / PAUSE / TEARDOWN / GET_PARAMETER)
    rtsp_auth: RTSP authentication (RFC 7616 Digest + RFC 7617 Basic) + nonce anti-replay
    rtsp_sdp: SDP generation for H.264 / H.265 elementary streams
    rtsp_error: RTSP scaffold error handling — malformed requests, bad-state dispatch, backend fallback

# Coverage settings.
#
# Phase 51 original shape: targets the most safety-critical modules
# at 85%, the rest at 60%. Run with `pytest --cov` or via CI which
# always passes --cov-fail-under.
#
# Phase-3 SP-10.1 / task #83 (2026-04-21): add the 95% gate entry
# point for the six safety-critical modules named in the design doc
# (docs/phase-3-runtime-v2/01-design-decisions.md §8.1):
#   backend.db / backend.db_pool / backend.db_context /
#   backend.audit / backend.auth / backend.tenant_secrets
#
# The gate is **not** wired into ``addopts`` — wiring it there would
# break every non-coverage pytest invocation (individual file runs,
# ``-x``, pytest-cov not installed locally, etc). Instead callers
# opt in explicitly, e.g.:
#
#   pytest backend/tests/ \
#       --cov=backend.db --cov=backend.db_pool --cov=backend.db_context \
#       --cov=backend.audit --cov=backend.auth --cov=backend.tenant_secrets \
#       --cov-report=term-missing --cov-branch --cov-fail-under=95
#
# CI shards the suite four ways (see ``.github/workflows/ci.yml``)
# and combines via ``coverage combine`` before applying the gate —
# the shape of that pipeline (H6 fix, commit 87f8975) is the
# authoritative measurement. Local single-process runs give a
# low-biased number because the full suite takes 60-180 min per the
# project memory.
[coverage:run]
source = backend
branch = true
omit =
    backend/tests/*
    backend/.venv/*
    backend/__pycache__/*
    backend/docker/*

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
precision = 1
show_missing = false
skip_covered = false
