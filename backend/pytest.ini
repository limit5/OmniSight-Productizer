[pytest]
asyncio_mode = auto
# pytest-asyncio 1.x deprecated the implicit fixture-loop scope; future
# versions default to function. Pin it explicitly so the warning goes
# away and the contract stays stable across upgrades.
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — registered so pytest ≥ 7 stops emitting
# PytestUnknownMarkWarning at collection time (audit H1). All 11 live
# under backend/tests/test_uvc_gadget.py, which partitions the UVC
# Gadget conformance suite along the axes below. Keep this list in
# sync with the decorators in that file.
markers =
    descriptor: UVC descriptor-chain conformance (VC/VS interface, extension-unit, still-image)
    lifecycle: UVC gadget bind / unbind / hot-reset lifecycle transitions
    payload: iso / bulk payload framing, packet sizing, and error recovery
    error_handling: stall conditions, malformed requests, and recovery paths
    gadgetfs: FunctionFS + gadgetfs control-endpoint behaviours
    extension_unit: XU (Extension Unit) control-selector round-trips
    enums: USB Video Class enumerated constants (request codes, entity types)
    compliance: USB-IF + UAC/UVC spec compliance checks
    still_image: still-image capture trigger + VS_STILL_IMAGE_FRAME_TYPE payload
    rest_api: REST bridge for gadget control / introspection
    config: runtime + persisted gadget configuration surface

# Phase 51: coverage settings. Targets the most safety-critical
# modules at 85%, the rest at 60%. Run with `pytest --cov` or via
# CI which always passes --cov-fail-under.
[coverage:run]
source = backend
omit =
    backend/tests/*
    backend/.venv/*
    backend/__pycache__/*
    backend/docker/*

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
precision = 1
show_missing = false
skip_covered = false
