version: "3.9"

# Development compose — hot reload, debug mode
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./.artifacts:/app/.artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OMNISIGHT_DEBUG=true
      - OMNISIGHT_FRONTEND_ORIGIN=http://localhost:3000
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
    env_file:
      - .env
    restart: unless-stopped
    # FX.7.7 — cgroup memory caps. Dev image runs uvicorn --reload + a single
    # worker so steady-state RSS is ~300-500 MB; 4 GB ceiling tolerates a
    # debugger / large dataset load, mem_reservation=512m is the soft floor
    # under host pressure (matches typical dev workload baseline).
    mem_limit: 4g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    # FX.7.7 — cgroup memory caps. Next.js dev server (hot-reload + bundler)
    # peaks higher than prod SSR; 2g ceiling matches prod frontend cap so
    # local OOM behaviour matches what prod hits, mem_reservation=512m
    # mirrors the prod soft floor.
    mem_limit: 2g
    mem_reservation: 512m

  # ──────────────────────────────────────────────────────────────
  # O3 (#266): stateless agent worker pool.
  # Bring up with:  docker compose --profile workers up -d
  # Scale with:     docker compose --profile workers up -d --scale worker=3
  # ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["workers"]
    command: >
      python3 -m backend.worker run
      --capacity ${OMNISIGHT_WORKER_CAPACITY:-1}
      --tenant-filter ${OMNISIGHT_WORKER_TENANT_FILTER:-}
      --capability-filter ${OMNISIGHT_WORKER_CAPABILITY_FILTER:-}
    volumes:
      - ./backend:/app/backend
      - ./configs:/app/configs
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./.artifacts:/app/.artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OMNISIGHT_DATABASE_PATH=/app/data/omnisight.db
    env_file:
      - .env
    depends_on:
      - backend
    stop_signal: SIGTERM
    stop_grace_period: 60s
    restart: unless-stopped
    # FX.7.7 — cgroup memory caps. Worker is stateless agent runtime;
    # baseline ~150 MB, occasional bursts during large doc/code execution.
    # 2g ceiling stops a runaway agent loop from starving backend, 256m
    # reservation is the host-pressure soft floor (workers scale ≥ 1, so
    # the floor is per-replica, not aggregate).
    mem_limit: 2g
    mem_reservation: 256m
