# G4 #3 — PostgreSQL 16 host-based authentication for OmniSight HA.
#
# Shared by BOTH primary and standby (same file, mounted read-only into
# both containers). Keeps auth policy symmetric so that a promoted
# standby does not need an auth swap to accept the same app connections.
#
# Mount path (compose):
#   /etc/postgresql/pg_hba.conf  (read-only bind-mount)
#
# Auth method: scram-sha-256 (PostgreSQL 14+ default, MUCH safer than
# md5 which is deprecated and leaks password hashes on wire with
# trivially-crackable replay). Both primary_conninfo (standby→primary)
# and the OmniSight app connect string use scram-sha-256.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ----- Local socket (container-internal superuser init) -----------------
# `trust` is acceptable here because the unix-socket path inside the
# container is only reachable from the postgres process itself; there
# is no shared-hosting concern. Docker-entrypoint-initdb.d runs under
# this same socket during the bootstrap window.
local   all             all                                     trust

# ----- Loopback IPv4/IPv6 (docker-entrypoint-initdb.d fallback) ---------
# Some tooling (pg_basebackup / psql -h 127.0.0.1) connects via TCP even
# inside the container. scram-sha-256 requires a password, which the
# entrypoint provides via POSTGRES_PASSWORD, so we stay on scram here
# and never fall back to trust/md5.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# ----- Replication (standby → primary, pg_basebackup + streaming) -------
# The `replicator` role is created by `init-primary.sh` with
# REPLICATION privilege only (no table access). The `all` address
# here means "any host on the docker network" — in a multi-host
# deploy pin this to the standby's IP/CIDR instead.
host    replication     replicator      0.0.0.0/0               scram-sha-256
host    replication     replicator      ::/0                    scram-sha-256

# ----- Application clients (backend-a / backend-b → pg-primary) ---------
# The OmniSight backend connects as POSTGRES_USER with POSTGRES_PASSWORD
# via `postgresql+asyncpg://` (G4 #2 connection abstraction). `all 0.0.0.0/0`
# is permissive at the HBA layer because the docker network already
# firewalls reachability. Tighten to a specific subnet in multi-host
# deploys via an override pg_hba.conf mount.
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
