# G4 #3 — PostgreSQL 16 standby configuration for OmniSight HA.
#
# Paired with `postgresql.primary.conf` as the hot-standby follower in a
# streaming-replication setup. Replication is configured dynamically by
# `init-standby.sh` via `pg_basebackup` + `standby.signal` + env-expanded
# `primary_conninfo`, so THIS file only carries the static knobs the
# standby needs once it is up and following the primary.
#
# Mount path (compose):
#   /etc/postgresql/postgresql.conf  (read-only bind-mount)
# Loaded via postgres `-c config_file=...` argument (see docker-compose.yml).

# ----- Connection & auth --------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100

# ----- Hot standby (read-only query access while following primary) -----
# Without `hot_standby = on` the replica refuses client connections and
# only accepts WAL from the primary — useless for read-replica traffic.
hot_standby = on

# `hot_standby_feedback = on` pushes the replica's oldest running query
# horizon back to the primary so the primary can delay VACUUM cleanup of
# rows still needed by long-running standby queries. Trade-off: bloat on
# primary grows if standby has a stuck transaction. Acceptable for
# OmniSight because standby workload is short audit/decision reads.
hot_standby_feedback = on

# Cap how long the standby will wait before cancelling a conflicting
# replica query in favor of applying WAL. 30 s is enough for typical
# admin queries and well under the wal_receiver_timeout below.
max_standby_streaming_delay = 30s
max_standby_archive_delay = 30s

# If the stream is silent for this long, assume the sender is dead and
# reconnect. Keep symmetric with the primary's server-side timeouts.
wal_receiver_timeout = 60s
wal_receiver_status_interval = 10s

# ----- WAL / replication (standby values) --------------------------------
# Same WAL level as the primary — the standby must be able to act as a
# WAL sender if it is ever promoted or used as a cascading source.
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB

# Synchronous replication applies only at the PRIMARY side — on the
# standby these knobs are no-ops but kept symmetric so a promoted
# standby does not need a config swap to start accepting sync follower
# connections of its own.
synchronous_commit = on
synchronous_standby_names = ''

# ----- Logging ------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500ms
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %q%u@%d/%a '
log_checkpoints = on
log_replication_commands = on

# ----- Checkpoints --------------------------------------------------------
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB

# ----- Timezone -----------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'
datestyle = 'iso, mdy'
