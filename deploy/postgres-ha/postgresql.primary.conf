# G4 #3 — PostgreSQL 16 primary configuration for OmniSight HA.
#
# Delivered with `deploy/postgres-ha/docker-compose.yml` as the primary
# node of a primary + hot standby pair. All replication-critical knobs
# live in THIS file so an operator can diff `primary` vs `standby`
# without chasing env var substitutions.
#
# Mount path (compose):
#   /etc/postgresql/postgresql.conf  (read-only bind-mount)
# Loaded via postgres `-c config_file=...` argument (see docker-compose.yml).

# ----- Connection & auth --------------------------------------------------
listen_addresses = '*'
port = 5432
# Phase-3-Runtime-v2 SP-1.1 (2026-04-20): raised 100 → 200 to give the
# asyncpg.Pool headroom for multi-user load. Sizing math:
#   2 replicas × 2 workers × pool max_size 20        =  80 peak app conns
#   plus prewarm / admin / alembic / standby repl    =  ~15
#   safety margin (burst / failover)                 =  ~105
# Total budget 200 leaves ample headroom for pg_dump / ad-hoc psql without
# hitting the cap. Not a SIGHUP parameter — changing it requires a full
# restart (pg_ctl reload is insufficient).
#
# Replication invariant: standby's max_connections MUST be >= primary's,
# otherwise WAL replay will refuse new client sessions when replaying a
# primary commit that touched a connection slot the standby can't allocate.
# Both conf files are kept in lock-step and asserted via a contract test
# (backend/tests/test_pg_ha_deployment.py::TestPrimaryConf).
max_connections = 200

# ----- WAL / replication --------------------------------------------------
# `replica` is the minimum level for streaming replication + hot standby.
# `logical` would also work but bumps WAL volume — we only need physical
# streaming for G4 #3 (G4 #5 runbook can opt-in to `logical` for CDC).
wal_level = replica

# Cap the number of WAL sender processes. One per connected standby plus
# a headroom for `pg_basebackup` during seeding. 10 is plenty for 2-3
# replicas without blowing up the process table.
max_wal_senders = 10
max_replication_slots = 10

# Keep at least 1 GiB of WAL on disk so a standby that disconnects briefly
# can reconnect without needing `pg_basebackup` re-seed. Sized against the
# expected write rate of the OmniSight audit_log + decision_log tables.
wal_keep_size = 1GB

# ----- Synchronous replication (operator-configurable) -------------------
# `synchronous_commit = on` is the PG default — WAL is flushed to disk on
# the primary before COMMIT returns. To make replication *synchronous*
# (primary waits for standby flush), set:
#   synchronous_standby_names = 'FIRST 1 (omnisight_standby)'
# The standby advertises `application_name=omnisight_standby` in its
# `primary_conninfo` (see postgresql.standby.conf). Leaving
# `synchronous_standby_names` empty gives asynchronous replication —
# operator policy choice documented in docs/ops/db_failover.md (G4 #5).
synchronous_commit = on
synchronous_standby_names = ''

# ----- Hot standby toggles (no-op on primary, symmetric with standby) ----
# Harmless to leave `hot_standby = on` on the primary; lets the SAME
# postgresql.conf be used as a base for the standby if an operator ever
# needs to promote the standby to primary and re-hydrate a new standby
# from the just-promoted node.
hot_standby = on

# ----- Archiving (default off, opt-in for PITR) --------------------------
# G4 #3 scope is primary + streaming hot standby. PITR / WAL archival is
# a G4 #5 runbook follow-up; keep the knobs here so operators can flip
# `archive_mode = on` + set `archive_command` without editing an extra
# file.
archive_mode = off
# archive_command = 'test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f'

# ----- Logging ------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500ms
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %q%u@%d/%a '
log_checkpoints = on
log_replication_commands = on

# ----- Checkpoints --------------------------------------------------------
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB

# ----- Autovacuum ---------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# ----- Timezone -----------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'
datestyle = 'iso, mdy'
