# G5 #2 (TODO row 1370) — Backend Deployment.
#
# Charter: `docs/ops/orchestration_selection.md` §7.4.
#   * replicas: 2 (HA-02 baseline — matches the two compose replicas
#     backend-a / backend-b we already ship in docker-compose.prod.yml).
#   * strategy: RollingUpdate with maxUnavailable=0 and maxSurge=1.
#     Only configuration that delivers zero-downtime rollouts on a
#     2-replica backend and matches the G2 rolling-restart semantics
#     already in deploy/blue-green/.
#
# Probes wired in G5 #4 (TODO row 1372) — httpGet to the G1 endpoints
# (`/livez` for liveness, `/readyz` for readiness) per charter §7.3.
#
# The PodDisruptionBudget (minAvailable=1) lands in G5 #3 (TODO row
# 1371) as a separate manifest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnisight-backend
  namespace: omnisight
  labels:
    app.kubernetes.io/name: omnisight-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: omnisight
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omnisight-backend
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnisight-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: omnisight
    spec:
      # Per charter §3.2, runtime is containerd on CNCF-certified distros.
      # No custom securityContext here — K8s defaults + O10 baseline
      # (future PodSecurity admission) handle it.
      containers:
        - name: backend
          image: ghcr.io/your-org/omnisight-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # OMNISIGHT_INSTANCE_ID is emitted as a Prometheus label by
            # the backend; using the pod name keeps parity with the
            # compose-level backend-a / backend-b naming convention.
            - name: OMNISIGHT_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # Resources.requests.cpu is REQUIRED for HPA CPU utilisation
          # (40-hpa-backend.yaml targets 70%). Without a request, HPA
          # cannot compute a percentage and silently stays at minReplicas.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          # G5 #4 (TODO row 1372) — probes wire to the G1 endpoints per
          # charter §7.3. httpGet is intentional: the G1 endpoint is
          # HTTP (not exec, not tcpSocket).
          #
          # `/livez` is a byte-identical alias of `/healthz` that G1
          # ships specifically so the K8s Deployment can follow the
          # charter spelling without having to choose between two
          # existing paths. Both go through `health_mod.healthz`, so
          # this wiring hits the G1 handler with zero drift.
          #
          # `/readyz` evaluates DB + migrations + provider chain and
          # starts returning 503 the moment the graceful-shutdown gate
          # flips to draining — that's the mechanism the LB uses to
          # take a replica out of rotation ahead of the 30s in-flight
          # budget. K8s sees those 503s and marks the pod NotReady
          # after `failureThreshold` consecutive failures at
          # `periodSeconds` cadence (3 × 5s = 15s under the 30s budget).
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          # Liveness is process-dead-detection, not ready-to-serve. We
          # use a longer period + longer initial delay than readiness:
          # restarting a cold-starting pod is the failure mode we want
          # to avoid, and liveness has no I/O so false negatives only
          # happen when the event loop is truly stuck. failureThreshold
          # 3 × periodSeconds 10 = 30s before restart, which matches
          # the G1 graceful-shutdown grace budget.
          livenessProbe:
            httpGet:
              path: /livez
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
