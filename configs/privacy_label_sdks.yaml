# P6 #291 — SDK → data-collection mapping for mobile privacy labels
# (iOS App Privacy / Play Data Safety Form).
#
# Derivation source: each SDK's public privacy / data collection
# documentation. The categories are the union of Apple's iOS
# "Privacy Details" taxonomy and Google Play's Data Safety
# taxonomy — the two overlap in intent even when the wording differs.
#
# Schema:
#   sdks:
#     <SDK identifier>:
#       # Human-readable name shown in generated labels.
#       display_name: str
#       # One or more identifiers for the same SDK across ecosystems.
#       # The matcher checks these as substring/prefix against pod names
#       # (iOS) and Maven coordinates (Android).
#       identifiers:
#         - "FirebaseAnalytics"           # iOS pod name
#         - "com.google.firebase:firebase-analytics"  # Android Maven coord
#       # Data categories the SDK collects by default. Values are from
#       # the APPLE_CATEGORY_TAXONOMY list in privacy_labels.py.
#       apple_categories:
#         - Identifiers
#         - Usage Data
#       # Play categories (may partially overlap).
#       play_categories:
#         - Device or other IDs
#         - App activity
#       # Purpose codes — Apple's list of declared purposes. Rotated
#       # once per SDK: the most common purpose.
#       purposes:
#         - Analytics
#       # Whether the data is linked to user identity ("tracking" bit).
#       linked_to_user: true
#       # Whether the SDK tracks across other apps / websites ("used
#       # for tracking"). Drives AppTrackingTransparency requirement.
#       tracking: false

sdks:
  firebase_analytics:
    display_name: Firebase Analytics
    identifiers:
      - FirebaseAnalytics
      - com.google.firebase:firebase-analytics
      - com.google.firebase:firebase-analytics-ktx
    apple_categories:
      - Identifiers
      - Usage Data
      - Diagnostics
    play_categories:
      - Device or other IDs
      - App activity
      - App info and performance
    purposes:
      - Analytics
    linked_to_user: true
    tracking: false

