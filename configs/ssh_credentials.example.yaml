# OmniSight SSH Runner Target Registry
# Copy to ssh_credentials.yaml and fill in your target board details.
#
# Each entry describes a remote board reachable via SSH.
# The SSH runner selects the first target matching the requested arch/os.

targets:
  # Example: Rockchip RK3588 EVK board
  # - id: rk3588-evk
  #   arch: aarch64
  #   os: linux
  #   host: "192.168.1.100"
  #   port: 22
  #   user: root
  #   key_path: "~/.ssh/id_ed25519"
  #   sysroot_path: "/opt/vendor_sysroot"
  #   scratch_dir: "/tmp/omnisight"

  # Example: RISC-V board
  # - id: lichee-rv
  #   arch: riscv64
  #   os: linux
  #   host: "192.168.1.101"
  #   port: 22
  #   user: root
  #   key_path: "~/.ssh/id_riscv"
  #   scratch_dir: "/tmp/omnisight"

  # Example: Loopback for integration testing
  # - id: localhost-test
  #   arch: x86_64
  #   os: linux
  #   host: "127.0.0.1"
  #   port: 22
  #   user: "${USER}"
  #   key_path: "~/.ssh/id_ed25519"
  #   scratch_dir: "/tmp/omnisight-test"
