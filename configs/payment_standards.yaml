schema_version: 1

pci_dss:
  name: "PCI-DSS v4.0"
  description: "Payment Card Industry Data Security Standard"
  levels:
    - id: "L1"
      name: "Level 1"
      description: "Merchants processing over 6M transactions/year — annual ROC by QSA"
      validation_type: "roc"
      required_artifacts:
        - network_diagram
        - data_flow_diagram
        - firewall_ruleset_review
        - encryption_inventory
        - access_control_matrix
        - vulnerability_scan_report
        - penetration_test_report
        - incident_response_plan
        - security_policy_document
        - aoc
      required_dag_tasks:
        - network_segmentation_test
        - vulnerability_scan
        - penetration_test
        - access_review
        - encryption_validation
        - log_review
        - code_review
    - id: "L2"
      name: "Level 2"
      description: "Merchants processing 1M-6M transactions/year — annual SAQ + quarterly ASV"
      validation_type: "saq_d"
      required_artifacts:
        - network_diagram
        - data_flow_diagram
        - encryption_inventory
        - access_control_matrix
        - vulnerability_scan_report
        - security_policy_document
        - saq
      required_dag_tasks:
        - vulnerability_scan
        - access_review
        - encryption_validation
        - log_review
    - id: "L3"
      name: "Level 3"
      description: "Merchants processing 20K-1M e-commerce transactions/year"
      validation_type: "saq"
      required_artifacts:
        - network_diagram
        - encryption_inventory
        - vulnerability_scan_report
        - saq
      required_dag_tasks:
        - vulnerability_scan
        - encryption_validation
    - id: "L4"
      name: "Level 4"
      description: "Merchants processing fewer than 20K e-commerce or up to 1M other transactions/year"
      validation_type: "saq"
      required_artifacts:
        - encryption_inventory
        - vulnerability_scan_report
        - saq
      required_dag_tasks:
        - vulnerability_scan
        - encryption_validation

  requirements:
    req_1:
      id: "req_1"
      title: "Install and maintain network security controls"
      description: "Firewalls, network segmentation, DMZ architecture"
      artifacts:
        - network_diagram
        - firewall_ruleset_review
      tasks:
        - network_segmentation_test
    req_2:
      id: "req_2"
      title: "Apply secure configurations to all system components"
      description: "Remove defaults, harden OS/services, configuration baselines"
      artifacts:
        - configuration_baseline
        - hardening_checklist
      tasks:
        - configuration_audit
    req_3:
      id: "req_3"
      title: "Protect stored account data"
      description: "Encryption at rest, key management, data retention, masking"
      artifacts:
        - encryption_inventory
        - key_management_procedure
        - data_retention_policy
      tasks:
        - encryption_validation
        - key_rotation_test
    req_4:
      id: "req_4"
      title: "Protect cardholder data with strong cryptography during transmission"
      description: "TLS 1.2+, certificate management, no deprecated protocols"
      artifacts:
        - tls_configuration
        - certificate_inventory
      tasks:
        - tls_scan
    req_5:
      id: "req_5"
      title: "Protect all systems and networks from malicious software"
      description: "Anti-malware, integrity monitoring"
      artifacts:
        - antimalware_policy
      tasks:
        - malware_scan
    req_6:
      id: "req_6"
      title: "Develop and maintain secure systems and software"
      description: "Secure SDLC, code review, vulnerability management"
      artifacts:
        - secure_sdlc_policy
        - code_review_report
      tasks:
        - code_review
        - vulnerability_scan
    req_7:
      id: "req_7"
      title: "Restrict access to system components and cardholder data by business need to know"
      description: "Role-based access, least privilege"
      artifacts:
        - access_control_matrix
      tasks:
        - access_review
    req_8:
      id: "req_8"
      title: "Identify users and authenticate access to system components"
      description: "MFA, password policies, unique IDs"
      artifacts:
        - authentication_policy
        - mfa_deployment_evidence
      tasks:
        - authentication_audit
    req_9:
      id: "req_9"
      title: "Restrict physical access to cardholder data"
      description: "Physical security controls, visitor logs, media handling"
      artifacts:
        - physical_security_plan
        - visitor_log_procedure
      tasks:
        - physical_security_audit
    req_10:
      id: "req_10"
      title: "Log and monitor all access to system components and cardholder data"
      description: "Centralized logging, tamper-evident logs, alerting"
      artifacts:
        - logging_architecture
        - log_retention_policy
      tasks:
        - log_review
        - log_integrity_test
    req_11:
      id: "req_11"
      title: "Test security of systems and networks regularly"
      description: "Vulnerability scanning, penetration testing, IDS/IPS"
      artifacts:
        - vulnerability_scan_report
        - penetration_test_report
      tasks:
        - vulnerability_scan
        - penetration_test
    req_12:
      id: "req_12"
      title: "Support information security with organizational policies and programs"
      description: "Security policy, awareness training, risk assessment"
      artifacts:
        - security_policy_document
        - incident_response_plan
        - risk_assessment
      tasks:
        - security_awareness_test

pci_pts:
  name: "PCI-PTS v6.x"
  description: "PIN Transaction Security — physical and logical security for payment terminals"
  modules:
    - id: "core"
      name: "Core Requirements"
      description: "Base security requirements for all POI devices"
      rules:
        - id: "pts_core_1"
          title: "Tamper detection and response"
          description: "Device must detect and respond to physical tampering by erasing sensitive data"
          severity: "critical"
          required_artifacts:
            - tamper_detection_design
            - tamper_response_test_report
        - id: "pts_core_2"
          title: "Secure key storage"
          description: "Cryptographic keys must be stored in tamper-resistant hardware"
          severity: "critical"
          required_artifacts:
            - key_storage_architecture
            - key_injection_procedure
        - id: "pts_core_3"
          title: "Firmware integrity"
          description: "Firmware must be signed and verified at boot"
          severity: "critical"
          required_artifacts:
            - firmware_signing_procedure
            - secure_boot_evidence
        - id: "pts_core_4"
          title: "Secure communications"
          description: "All external communications must use approved cryptographic protocols"
          severity: "high"
          required_artifacts:
            - communication_protocol_spec
            - tls_configuration
    - id: "sred"
      name: "Secure Reading and Exchange of Data (SRED)"
      description: "Requirements for encrypting account data from point of interaction"
      rules:
        - id: "pts_sred_1"
          title: "Point-of-interaction encryption"
          description: "Account data must be encrypted immediately upon capture"
          severity: "critical"
          required_artifacts:
            - poi_encryption_design
            - dukpt_key_management
        - id: "pts_sred_2"
          title: "Decryption environment isolation"
          description: "Decryption must occur only in a secure, isolated environment (HSM)"
          severity: "critical"
          required_artifacts:
            - hsm_integration_spec
            - decryption_environment_audit
    - id: "open_protocols"
      name: "Open Protocols"
      description: "Requirements for devices using open communication protocols"
      rules:
        - id: "pts_open_1"
          title: "Protocol hardening"
          description: "Open protocols must be hardened against injection and MITM"
          severity: "high"
          required_artifacts:
            - protocol_hardening_report

emv:
  name: "EMV Specifications"
  description: "Europay, Mastercard, Visa — chip card transaction standards"
  levels:
    - id: "L1"
      name: "EMV Level 1 — Electromechanical"
      description: "Hardware interface between card and terminal (contact + contactless)"
      test_categories:
        - contact_interface
        - contactless_interface
        - electrical_characteristics
        - mechanical_characteristics
      required_artifacts:
        - emv_l1_test_plan
        - contact_interface_test_report
        - contactless_interface_test_report
        - antenna_tuning_report
      required_dag_tasks:
        - emv_l1_contact_test
        - emv_l1_contactless_test
    - id: "L2"
      name: "EMV Level 2 — Kernel"
      description: "Payment application kernel processing (transaction flow, CVM, risk management)"
      test_categories:
        - application_selection
        - transaction_flow
        - cardholder_verification
        - risk_management
        - online_processing
      required_artifacts:
        - emv_l2_test_plan
        - kernel_certification_report
        - transaction_flow_test_report
        - cvm_test_report
      required_dag_tasks:
        - emv_l2_kernel_test
        - emv_l2_transaction_test
        - emv_l2_cvm_test
    - id: "L3"
      name: "EMV Level 3 — Application"
      description: "End-to-end acceptance testing (brand-specific: Visa, Mastercard, etc.)"
      test_categories:
        - brand_acceptance
        - host_integration
        - receipt_formatting
        - error_handling
      required_artifacts:
        - emv_l3_test_plan
        - brand_acceptance_report
        - host_integration_test_report
        - receipt_format_validation
      required_dag_tasks:
        - emv_l3_brand_test
        - emv_l3_host_test

p2pe:
  name: "PCI P2PE v3.x"
  description: "Point-to-Point Encryption — encrypt cardholder data from POI to decryption environment"
  domains:
    - id: "encryption"
      name: "Encryption Domain"
      description: "POI device encryption of account data"
      controls:
        - id: "p2pe_enc_1"
          title: "DUKPT key management"
          description: "Derived Unique Key Per Transaction for symmetric encryption"
          key_algorithm: "AES-256"
          derivation: "DUKPT"
          required_artifacts:
            - dukpt_implementation_spec
            - key_derivation_test_report
        - id: "p2pe_enc_2"
          title: "Initial key injection"
          description: "Secure initial key loading into POI device via KIF or remote injection"
          injection_methods:
            - "kif_ceremony"
            - "remote_key_injection"
          required_artifacts:
            - key_injection_procedure
            - kif_audit_report
        - id: "p2pe_enc_3"
          title: "Encryption activation"
          description: "Account data encrypted immediately at point of interaction"
          required_artifacts:
            - poi_encryption_activation_evidence
    - id: "decryption"
      name: "Decryption Domain"
      description: "HSM-based decryption environment"
      controls:
        - id: "p2pe_dec_1"
          title: "HSM decryption"
          description: "Decryption only in FIPS 140-2/3 Level 3+ HSM"
          required_artifacts:
            - hsm_fips_certificate
            - decryption_architecture
        - id: "p2pe_dec_2"
          title: "Key management in HSM"
          description: "All master keys and working keys reside solely within HSM boundary"
          required_artifacts:
            - key_hierarchy_document
            - hsm_key_ceremony_log
    - id: "key_injection"
      name: "Key Injection Domain"
      description: "Secure key injection facility (KIF) requirements"
      controls:
        - id: "p2pe_ki_1"
          title: "KIF physical security"
          description: "Dual control, split knowledge, tamper-evident bags, CCTV"
          required_artifacts:
            - kif_physical_security_plan
            - kif_access_log
        - id: "p2pe_ki_2"
          title: "Key component management"
          description: "Key components never combined outside HSM, custodian procedures"
          required_artifacts:
            - key_custodian_procedure
            - split_knowledge_evidence

hsm_vendors:
  - id: "thales"
    name: "Thales payShield 10K"
    type: "payment_hsm"
    fips_level: "FIPS 140-2 Level 3"
    pci_pts_certified: true
    protocols:
      - "host_command"
      - "racf"
      - "pkcs11"
    key_types:
      - "zmk"
      - "zpk"
      - "pvk"
      - "cvk"
      - "bdk"
      - "ipek"
    supported_algorithms:
      - "3DES"
      - "AES-128"
      - "AES-256"
      - "RSA-2048"
      - "RSA-4096"
      - "ECC-P256"
    commands:
      generate_key: "A0"
      import_key: "A6"
      translate_pin: "CA"
      verify_pin: "DA"
      generate_mac: "MA"
      encrypt_data: "M0"

  - id: "utimaco"
    name: "Utimaco CryptoServer Se Gen2"
    type: "general_purpose_hsm"
    fips_level: "FIPS 140-2 Level 4"
    pci_pts_certified: true
    protocols:
      - "pkcs11"
      - "jce"
      - "cng"
      - "rest_api"
    key_types:
      - "zmk"
      - "zpk"
      - "bdk"
      - "kek"
    supported_algorithms:
      - "AES-128"
      - "AES-256"
      - "RSA-2048"
      - "RSA-4096"
      - "ECC-P256"
      - "ECC-P384"
      - "Ed25519"
    commands:
      generate_key: "CXI_KEY_GENERATE"
      import_key: "CXI_KEY_IMPORT"
      encrypt: "CXI_CRYPT_ENCRYPT"
      decrypt: "CXI_CRYPT_DECRYPT"
      sign: "CXI_CRYPT_SIGN"

  - id: "safenet"
    name: "Thales Luna Network HSM 7 (SafeNet)"
    type: "general_purpose_hsm"
    fips_level: "FIPS 140-2 Level 3"
    pci_pts_certified: false
    protocols:
      - "pkcs11"
      - "jce"
      - "cng"
      - "openssl_engine"
    key_types:
      - "aes"
      - "rsa"
      - "ecc"
      - "hmac"
    supported_algorithms:
      - "AES-128"
      - "AES-256"
      - "RSA-2048"
      - "RSA-4096"
      - "ECC-P256"
      - "ECC-P384"
    commands:
      generate_key: "C_GenerateKey"
      import_key: "C_UnwrapKey"
      encrypt: "C_Encrypt"
      decrypt: "C_Decrypt"
      sign: "C_Sign"

