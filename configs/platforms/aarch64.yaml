# OmniSight Platform Profile: AArch64 (ARM 64-bit)
platform: aarch64
label: "ARM 64-bit (AArch64)"
target_kind: embedded    # W0 #274 — dispatch signal for backend/platform_profile.py

# Vendor info (optional — empty = generic platform)
vendor_id: ""
sdk_version: ""
sysroot_path: ""
cmake_toolchain_file: ""

# Toolchain
toolchain: aarch64-linux-gnu-gcc
cross_prefix: aarch64-linux-gnu-
qemu: qemu-aarch64-static
arch_flags: -march=armv8-a
kernel_arch: arm64

docker_packages:
  - gcc-aarch64-linux-gnu
  - g++-aarch64-linux-gnu
  - binutils-aarch64-linux-gnu
