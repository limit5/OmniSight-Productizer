  - rust-2021
  - cli
  - clap
  - clap-derive
  - anyhow
  - tokio
  - tracing
  - cargo-dist
  - cargo-deny
  - cargo-audit
  - cross-platform
  - single-binary
  - shell-completion
  - spdx
  - x7
