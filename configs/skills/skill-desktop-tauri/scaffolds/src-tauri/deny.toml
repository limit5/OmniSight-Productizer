# Generated by SKILL-DESKTOP-TAURI (X8 #304).
#
# cargo-deny config — the desktop-tauri / backend-rust role requires
# `cargo deny check` with zero deny findings across licenses + bans
# + sources + advisories. This file mirrors the SPDX allowlist at
# the project root so the cargo and npm sides stay aligned.

[licenses]
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "Zlib",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "SSPL-1.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
yanked = "deny"
ignore = []
