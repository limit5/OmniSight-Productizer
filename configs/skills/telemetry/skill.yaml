schema_version: 1
name: telemetry
description: "Telemetry backend — client SDK (crash dump + usage event + perf metric), batched ingestion with retry queue, partitioned storage with retention policy, PII redaction + opt-in consent, fleet health / crash rate / adoption dashboards"
version: "1.0.0"
author: "OmniSight"
license: "Proprietary"
compatible_socs:
  - hi3516
  - rk3566
  - rk3568
  - imx8m
  - stm32mp1
  - stm32h7
  - stm32f4
  - nrf52840
  - nrf5340
  - esp32s3
  - x86_64
depends_on_skills: []
depends_on_core:
  - CORE-05
  - CORE-15
  - CORE-16
artifacts:
  - kind: tasks
    path: tasks.yaml
  - kind: scaffolds
    path: scaffolds/
  - kind: tests
    path: tests/test_definitions.yaml
  - kind: hil
    path: hil/telemetry_hil_recipes.yaml
  - kind: docs
    path: docs/telemetry_integration_guide.md.j2
hooks:
  install: ""
  validate: ""
  enumerate: ""
keywords:
  - telemetry
  - crash-dump
  - usage-event
  - perf-metric
  - ingestion
  - retry-queue
  - pii-redaction
  - opt-in
  - consent
  - fleet-health
  - dashboard
  - retention
  - offline-queue
