    path: tasks.yaml
  - kind: scaffolds
    path: scaffolds
  - kind: tests
    path: tests
  - kind: hil
    path: hil
  - kind: docs
    path: docs

hooks:
  install: ""
  validate: ""
  enumerate: ""

