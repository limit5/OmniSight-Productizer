org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
android.useAndroidX=true

# RN 0.76 default runtime (P4 role skill anti-pattern lock-in).
hermesEnabled=true
newArchEnabled=true
# Exclude legacy armeabi-v7a for new projects — arm64-v8a covers 99%+.
reactNativeArchitectures=arm64-v8a
