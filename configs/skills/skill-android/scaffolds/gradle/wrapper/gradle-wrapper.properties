# SKILL-ANDROID (P8 #293) — Gradle wrapper descriptor.
#
# Gradle 8.7 is pinned to match the P1 Docker image (ghcr.io/omnisight/
# mobile-build). Raising the wrapper version locally without bumping the
# Docker image will cause CI to download a second distribution at build
# time — slow but safe. Lowering will break AGP 8.3.2.

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
