# SKILL-ANDROID (P8 #293) — gradle.properties.
#
# Only non-default JVM flags and AGP feature flags live here — project-
# specific settings (SDK versions, signing) go in app/build.gradle.kts.

# JVM memory — mirrors the P1 Docker image JVM defaults.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# AGP 8.x: use non-transitive R class (faster incremental builds).
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin 2.0 + Compose: enable the Compose compiler plugin.
kotlin.code.style=official
