# Generated by SKILL-GO-SERVICE (X6 #302).
#
# Linter preset aligned with the backend-go role skill (X2 #298):
# errcheck, gosec, staticcheck, revive mandatory; formatters run on
# every file. `golangci-lint run` must return 0 findings on PR.

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  revive:
    rules:
      - name: package-comments
      - name: exported
      - name: var-naming
      - name: unused-parameter
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
