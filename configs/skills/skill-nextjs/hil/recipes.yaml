# SKILL-NEXTJS HIL (hardware-in-the-loop) recipes — W6 #280
#
# "Hardware" here is the deploy target (Vercel Serverless POP /
# Cloudflare Edge). Each recipe describes a physical-side probe that
# can only run after a real deploy (not a dry-run) — used by the
# operator-run Step 7 smoke, not by CI.

recipes:
  - id: vercel-smoke-ssr
    name: "Vercel SSR cold-start smoke"
    description: >
      Hit the newly deployed URL five times from a cold region, assert
      P95 TTFB ≤ 500ms. Validates the Vercel Serverless function path
      (Node 20 runtime, 1024 MB memory — matches web-vercel.yaml).
    targets: [web-vercel]
    probe:
      kind: http_ttfb
      url: "${DEPLOY_URL}"
      iterations: 5
      p95_ms_ceiling: 500

  - id: cloudflare-edge-latency
    name: "Cloudflare Pages edge latency"
    description: >
      Hit the health endpoint from three PoPs (SJC / FRA / SIN); P95
      latency ≤ 200ms. Confirms the edge bundle deployed below the
      1 MiB V8-isolate cap.
    targets: [web-edge-cloudflare]
    probe:
      kind: http_ttfb
      url: "${DEPLOY_URL}/api/health"
      pops: [sjc, fra, sin]
      p95_ms_ceiling: 200

  - id: lighthouse-production
    name: "Lighthouse against production URL"
    description: >
      Run the W2 simulate-track Lighthouse gate against the live
      deploy — not the dev server. Catches regressions introduced by
      provider-side CDN settings (minify, Brotli) that only manifest
      post-deploy.
    targets: [web-vercel, web-edge-cloudflare]
    probe:
      kind: lighthouse
      url: "${DEPLOY_URL}"
      thresholds:
        performance: 80
        accessibility: 90
        seo: 95

  - id: wcag-live
    name: "Live WCAG AA axe-core run"
    description: >
      Run axe-core against the deployed URL; 0 critical + 0 serious
      expected. Matches the W5 WCAG gate threshold.
    targets: [web-vercel, web-edge-cloudflare]
    probe:
      kind: wcag
      url: "${DEPLOY_URL}"

  - id: rollback-smoke
    name: "W4 rollback path smoke"
    description: >
      Push an intentionally broken deploy, invoke
      ``adapter.rollback()``, assert production URL serves the
      previous good deployment within 60s.
    targets: [web-vercel, web-edge-cloudflare]
    probe:
      kind: rollback
      timeout_s: 60
