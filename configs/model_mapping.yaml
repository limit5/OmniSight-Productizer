# BP.A2A.10 sample model mapping for AgentCard generation.
#
# BP.F will enforce/warn/advisory-check this mapping in the LLM factory.
# A2A reads it as runtime metadata only, so operator edits update discovery
# cards without requiring a code change.

version: 1
mode: advisory

providers:
  anthropic:
    default_model: claude-sonnet-4-20250514
  openai:
    default_model: gpt-4o
  google:
    default_model: gemini-1.5-pro
  xai:
    default_model: grok-3-mini
  groq:
    default_model: llama-3.3-70b-versatile
  deepseek:
    default_model: deepseek-chat
  together:
    default_model: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
  openrouter:
    default_model: anthropic/claude-sonnet-4
  ollama:
    default_model: llama3.1

guilds:
  architect:
    model_spec: anthropic:claude-opus-4-20250514
